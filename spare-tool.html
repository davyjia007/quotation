<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>智能备品系统 | 专业物料清单</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
    --bg-dark:#0a0e17; --panel-bg:rgba(16,24,39,.85); --border-glow:#00f0ff;
    --text-main:#e2e8f0; --text-muted:#94a3b8; --accent-cyan:#22d3ee;
    --accent-blue:#3b82f6; --accent-green:#10b981; --accent-orange:#f59e0b;
}
*{ box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
body{ background:radial-gradient(circle at top right,#111827,var(--bg-dark)); margin:0; padding:30px 20px; display:flex; justify-content:center; color:var(--text-main); min-height:100vh; }
.container{ max-width:1550px; width:100%; background:var(--panel-bg); backdrop-filter:blur(12px); border-radius:24px; border:1px solid rgba(0,240,255,.15); box-shadow:0 0 30px rgba(0,240,255,.05); padding:36px 40px; }
h1{ font-size:2rem; font-weight:800; margin:0 0 8px; background:linear-gradient(90deg,var(--border-glow),var(--accent-blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.search-section{ background:rgba(15,23,42,.6); border-radius:20px; padding:20px 24px; border:1px solid rgba(255,255,255,.05); margin-bottom:30px; }
.search-wrapper{ display:flex; align-items:center; background:rgba(0,0,0,.4); border-radius:40px; border:1px solid rgba(34,211,238,.3); }
.product-input{ flex:1; padding:14px 24px; font-size:1rem; color:#fff; border:none; background:transparent; outline:none; }
.dropdown-btn{ background:rgba(34,211,238,.1); border:1px solid rgba(34,211,238,.3); color:var(--accent-cyan); border-radius:30px; padding:10px 24px; margin-right:6px; cursor:pointer; }
.search-suggestions{ margin-top:16px; display:flex; flex-wrap:wrap; gap:10px; }
.suggestion-tag{ background:rgba(34,211,238,.1); border:1px solid rgba(34,211,238,.4); padding:6px 16px; border-radius:20px; cursor:pointer; color:var(--accent-cyan); font-size:.8rem; }
.dropdown-panel{ margin-top:18px; background:rgba(15,23,42,.95); border-radius:20px; border:1px solid rgba(34,211,238,.2); max-height:420px; overflow-y:auto; }
.dropdown-panel.collapsed{ display:none; }
.category-group{ margin:12px; border-bottom:1px solid rgba(255,255,255,.05); }
.category-title{ font-weight:700; color:var(--accent-cyan); padding:12px; cursor:pointer; }
.product-item{ margin:10px 0; border-left:2px solid rgba(34,211,238,.3); padding-left:12px; }
.product-header{ color:#94a3b8; background:rgba(255,255,255,.03); padding:6px 14px; border-radius:20px; cursor:pointer; }
.model-list{ display:flex; flex-wrap:wrap; gap:10px; padding:10px 0 10px 20px; }
.model-list.collapsed, .products-container.collapsed{ display:none; }
.model-chip{ background:rgba(0,0,0,.3); border-radius:30px; padding:6px 16px; font-size:.8rem; cursor:pointer; color:#cbd5e1; border:1px solid rgba(255,255,255,.1); }
.control-row{ display:flex; flex-wrap:wrap; gap:24px; margin-top:36px; background:rgba(0,0,0,.2); padding:18px 24px; border-radius:20px; }
.control-group{ display:flex; align-items:center; gap:12px; background:rgba(30,41,59,.5); padding:8px 20px; border-radius:40px; }
select{ background:#0f172a; color:var(--accent-cyan); border:1px solid rgba(34,211,238,.3); padding:6px 14px; border-radius:20px; }
.size-grid{ display:flex; flex-wrap:wrap; gap:20px; }
.size-card{ background:rgba(15,23,42,.6); padding:16px; border-radius:20px; border:1px solid rgba(255,255,255,.08); text-align:center; min-width:140px; }
.size-label{ font-weight:700; font-size:.85rem; color:var(--accent-cyan); margin-bottom:8px; }
.size-input{ padding:8px 12px; border-radius:30px; border:1px solid rgba(56,189,248,.3); width:90px; text-align:center; background:rgba(0,0,0,.3); color:#fff; margin-top:12px; }
.size-matrix{ display:inline-flex; flex-direction:column; gap:4px; }
.matrix-row{ display:flex; gap:4px; justify-content:center; }
.matrix-cell{ width:22px; height:22px; background-color:rgba(34,211,238,.8); border-radius:4px; }
.detailed-preview-container{ margin-top:30px; }
.material-section{ background:rgba(15,23,42,.5); border-radius:20px; border:1px solid rgba(34,211,238,.2); margin-bottom:28px; overflow-x:auto; }
.section-title{ background:rgba(34,211,238,.15); padding:12px 20px; font-size:1.2rem; font-weight:700; color:var(--accent-cyan); border-bottom:1px solid rgba(34,211,238,.3); }
.preview-table { width:100%; border-collapse:collapse; font-size:0.85rem; table-layout:fixed; }
.preview-table th,.preview-table td { word-break:break-word; white-space:normal; }
.preview-table th:nth-child(1), .preview-table td:nth-child(1) { width:15%; }
.preview-table th:nth-child(2), .preview-table td:nth-child(2) { width:20%; }
.preview-table th:nth-child(3), .preview-table td:nth-child(3) { width:38%; }
.preview-table th:nth-child(4), .preview-table td:nth-child(4) { width:9%; }
.preview-table th:nth-child(5), .preview-table td:nth-child(5) { width:18%; }
.preview-table th{ background:rgba(0,0,0,.5); color:var(--accent-cyan); padding:12px 12px; text-align:left; border-bottom:1px solid rgba(255,255,255,.1); }
.preview-table td{ padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.05); color:var(--text-main); }
.preview-table tr:last-child td{ border-bottom:none; }
.empty-placeholder{ padding:30px; text-align:center; color:var(--text-muted); background:rgba(0,0,0,.2); border-radius:20px; margin-top:20px; }
.btn-excel{ background:linear-gradient(135deg,#10b981,#059669); color:white; border:none; padding:12px 28px; border-radius:40px; font-weight:700; cursor:pointer; margin-top:20px; width:auto; }
.switch { position:relative; display:inline-block; width:44px; height:24px; margin:0; }
.switch input { opacity:0; width:0; height:0; }
.slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:rgba(255,255,255,0.1); transition:.4s; border:1px solid rgba(255,255,255,0.2); border-radius:24px; }
.slider:before { position:absolute; content:""; height:16px; width:16px; left:3px; bottom:3px; background-color:var(--text-muted); transition:.4s; border-radius:50%; }
input:checked + .slider { background-color:rgba(34,211,238,0.2); border-color:var(--accent-cyan); }
input:checked + .slider:before { transform:translateX(20px); background-color:var(--accent-cyan); box-shadow:0 0 10px rgba(34,211,238,0.8); }
#mappingWrapper { margin-top:30px; border-radius:20px; overflow:hidden; border:1px solid rgba(34,211,238,.3); display:none; }
@media (max-width: 768px){
    body{padding:15px 8px;}
    .container{padding:20px 12px;border-radius:16px;}
    h1{font-size:1.5rem;}
    .search-wrapper{flex-direction:column;gap:10px;background:transparent;border:none;}
    .product-input{width:100%;padding:12px 16px;background:rgba(0,0,0,.4);border-radius:30px;border:1px solid rgba(34,211,238,.3);}
    .dropdown-btn{width:100%;text-align:center;margin-right:0;padding:10px 0;}
    .size-grid{flex-direction:column;gap:12px;}
    .size-card{min-width:100%;}
    .control-row{flex-direction:column;gap:12px;padding:12px;}
    .control-group{flex-wrap:wrap;justify-content:center;font-size:0.85rem;}
    .preview-table{font-size:0.7rem;min-width:550px;}
    .preview-table th,.preview-table td{padding:6px 8px;}
    .section-title{font-size:1rem;}
    .btn-excel{width:100%;text-align:center;}
</style>
</head>
<body>
<div class="container">
<button onclick="window.parent.postMessage('closeTool', '*')" style="background:#2563eb;border:none;color:#fff;padding:8px 16px;border-radius:12px;cursor:pointer;font-weight:600;font-size:0.9rem;margin-bottom:1rem;">返回填单大厅</button>
<h1>备品物料清单与系统拓扑</h1>
<div class="search-section">
    <div class="search-wrapper">
        <input type="text" id="productSearchInput" class="product-input" placeholder="输入产品型号搜索...">
        <button id="dropdownToggleBtn" class="dropdown-btn">产品目录</button>
    </div>
    <div id="suggestionArea" class="search-suggestions" style="display:none;"></div>
    <div id="dropdownPanel" class="dropdown-panel collapsed"></div>
</div>

<div id="quantityPanel" style="display:none;">
    <div id="selectedModelDisplay" style="color:var(--accent-cyan); font-weight:bold; margin-bottom:15px;">未选择型号</div>
    <div id="dynamicSizesContainer"></div>
    <div class="control-row">
        <div class="control-group"><span>🎛️ 主控系统：</span><select id="systemSelect"></select></div>
        <div class="control-group"><span>🚀 带宽：</span><select id="bandwidthSelect"></select></div>
        <div class="control-group"><input type="checkbox" id="demoCheckbox"><label>🎪 展会Demo</label></div>
        <div class="control-group"><input type="checkbox" id="customCheckbox"><label>📐 异形 (URC)</label><div id="urcInputWrapper" style="display:none;"><input type="number" id="urcCount" class="size-input" value="0" min="0"></div></div>
        <div class="control-group">
            <label class="switch"><input type="checkbox" id="mappingToggle"><span class="slider"></span></label>
            <label style="cursor:pointer;" onclick="document.getElementById('mappingToggle').click()">🕸️ 系统拓扑 (Mapping)</label>
        </div>
    </div>
</div>

<div id="mappingWrapper">
    <iframe id="mappingFrame" src="mapping.html" style="width:100%; height:900px; border:none; background:#0b0e14;"></iframe>
</div>

<div id="detailedPreviewContainer" class="detailed-preview-container" style="display:none;"></div>
<button id="exportExcelBtn" class="btn-excel" style="display:none;">📎 导出Excel</button>
</div>

<script>
let rawBomData = [];
let uniqueModels = [];
let currentModel = null;
let sizeQuantities = {};
let currentSystem = "";
let currentBandwidth = "1G";
let isDemo = false;
let customEnabled = false;
let urcCount = 0;
let currentSpares = [];
const VALID_SYSTEMS = ["Brompton", "MVR", "Nova", "Colorlight", "Other System"];
const EMERGENCY_ITEMS = [ {name:"模组IM"}, {name:"开关电源PSU"}, {name:"转接板HUB board"}, {name:"接收卡Receiving Card"} ];
const CATEGORY_MAP = { "Panel": "LED Screen", "屏体": "LED Screen", "Processor": "Processor", "主控": "Processor", "Cables": "Cables", "线材": "Cables", "Accessories": "Accessories", "配件": "Accessories", "Packing": "Package", "Package": "Package", "包装": "Package" };
const PRODUCTION_CATEGORIES = ["Panel", "屏体", "Processor", "主控", "Cables", "线材", "Accessories", "配件", "Packing", "Package", "包装"];
const PANEL_MATERIAL_CATEGORIES = new Set(["Panel", "屏体"]);
const SPARE_FREE_CATEGORIES = new Set(["Spare_free", "备品"]);
const SPARE_CHARGED_CATEGORIES = new Set(["Spare_charged"]);
const PROCESSOR_MATERIAL_CATEGORIES = new Set(["Processor", "processor"]);

function getMaterialCategory(row) {
    return (row["Material Category"] ?? "").toString().trim();
}

function getRatioValue(row) {
    let raw = row["Ratio"] ?? "0";
    let ratio = parseFloat(raw || "0");
    if (raw?.toString().includes("%")) ratio /= 100;
    return Number.isFinite(ratio) ? ratio : 0;
}

// ----- 核心：向 Mapping 发送数据（从 rawBomData 读取屏体规格）-----

function getCurrentProductCategory() {
    if (!rawBomData || !currentModel) return "";
    const row = rawBomData.find(item => item["Product Model"]?.toString().trim() === currentModel && PANEL_MATERIAL_CATEGORIES.has(getMaterialCategory(item)) && item["Product Category"])
        || rawBomData.find(item => item["Product Model"]?.toString().trim() === currentModel && item["Product Category"]);
    return row ? (row["Product Category"] || "").toString().trim() : "";
}


function normalizeSizeName(size) {
    const value = (size || '').toString().trim();
    if (value.toLowerCase() === 'quarter') return 'Mini';
    return value;
}

function parsePowerFromRow(row) {
    const direct = parseFloat(row["Power"] || '');
    if (Number.isFinite(direct) && direct > 0) return direct;
    return 0;
}

function getNumericField(row, names) {
    for (const name of names) {
        const value = parseInt(row[name], 10);
        if (Number.isFinite(value) && value > 0) return value;
    }
    return 0;
}

function parsePixelSpecFromRow(row) {
    const directW = getNumericField(row, ["Pixel Width"]);
    const directH = getNumericField(row, ["Pixel Height"]);
    const power = parsePowerFromRow(row);
    if (directW > 0 && directH > 0) {
        return { pixelW: directW, pixelH: directH, power: power || 300 };
    }
    return null;
}

function getCurrentScreenSpec() {
    const fallback = { pixelW: 128, pixelH: 128, power: 300 };
    if (!rawBomData || !currentModel) return fallback;
    const panelRows = rawBomData.filter(row =>
        row["Product Model"]?.toString().trim() === currentModel &&
        PANEL_MATERIAL_CATEGORIES.has(getMaterialCategory(row))
    );
    const preferredRows = panelRows.filter(row => normalizeSizeName(row["Size"]) === "Full").concat(panelRows);
    for (const row of preferredRows) {
        const spec = parsePixelSpecFromRow(row);
        if (spec) return spec;
    }
    return fallback;
}

function syncToMapping() {
    const toggle = document.getElementById('mappingToggle');
    const iframe = document.getElementById('mappingFrame');
    if (!toggle.checked || !iframe || !iframe.contentWindow) return;

    // 计算总箱体数（所有尺寸的数量之和）
    let totalFullCount = 0;
    for (let sz in sizeQuantities) {
        totalFullCount += sizeQuantities[sz] || 0;
    }

    const spec = getCurrentScreenSpec();
    let pixelW = spec.pixelW, pixelH = spec.pixelH, power = spec.power;

    iframe.contentWindow.postMessage({
        type: 'SYNC_MAPPING',
        model: currentModel,
        fullCount: totalFullCount,   // 传递总箱体数
        system: currentSystem,
        bandwidth: currentBandwidth,
        pixelW: pixelW,
        pixelH: pixelH,
        power: power,
        productCategory: getCurrentProductCategory(),
         hasHalfSupport: getModelSizes(currentModel).includes("Half")  
    }, '*');
}

// ----- 辅助函数 -----
function getUnitQuantityPerBox(materialName, sizeType) {
    const nameLower = materialName.toLowerCase();
    if (nameLower.includes("模组") || nameLower.includes("im")) {
        if (sizeType === "Full") return 4; if (sizeType === "Half" || sizeType === "Edge") return 2; return 1;
    }
    if (nameLower.includes("接收卡") || nameLower.includes("receiving card")) return 1;
    if (nameLower.includes("电源") || nameLower.includes("psu")) return sizeType === "Full" ? 2 : 1;
    if (nameLower.includes("转接板") || nameLower.includes("hub board")) return 1;
    if (nameLower.includes("线材") || nameLower.includes("网线") || nameLower.includes("排线") || nameLower.includes("电缆")) return 1;
    if (nameLower.includes("面罩") || nameLower.includes("灯珠") || nameLower.includes("驱动ic") || nameLower.includes("行mos管")) {
        if (sizeType === "Full") return 4; if (sizeType === "Half") return 2; return 1;
    }
    return 1;
}

function computeProductionMaterials() {
    if (!currentModel) return { "Processor": [], "Cables": [], "Accessories": [], "Package": [] };
    let sizeBoxCounts = {};
    for (let [sz, qty] of Object.entries(sizeQuantities)) if (qty > 0) sizeBoxCounts[sz] = qty;
    if (Object.keys(sizeBoxCounts).length === 0) return { "Processor": [], "Cables": [], "Accessories": [], "Package": [] };
    
    let candidateRows = rawBomData.filter(row => {
        if (row["Product Model"]?.toString().trim() !== currentModel) return false;
        const category = getMaterialCategory(row);
        let rowSize = row["Size"]?.toString().trim() || "";
        if (rowSize.toLowerCase() === "quarter") rowSize = "Mini";
        if (category !== "Accessories" && rowSize !== "" && (!sizeQuantities[rowSize] || sizeQuantities[rowSize] <= 0)) return false;
        let rowSys = row["System"]?.toString().trim() || "";
        if (VALID_SYSTEMS.includes(rowSys)) return rowSys === currentSystem;
        return true;
    });
    
    let resultMap = { "Processor": [], "Cables": [], "Accessories": [], "Package": [] };
    
    for (let row of candidateRows) {
        let productCat = getMaterialCategory(row);
        let mappedCat = CATEGORY_MAP[productCat];
        if (!mappedCat || !PRODUCTION_CATEGORIES.includes(productCat)) continue;
        let materialName = row["Part Name"] || "";
        let isCabinetUnit = PANEL_MATERIAL_CATEGORIES.has(productCat) && (materialName.includes("箱体") || materialName.includes("整机") || materialName.includes("单元板") || materialName === currentModel);
        if (PANEL_MATERIAL_CATEGORIES.has(productCat) && isCabinetUnit) continue; 
        
        let totalQuantity = 0;
        if (mappedCat === "Accessories") totalQuantity = Math.max(1, getRatioValue(row));
        for (let [sz, boxQty] of Object.entries(sizeBoxCounts)) {
            if (mappedCat === "Accessories") break;
            let rowSize = row["Size"]?.toString().trim() || "";
            if (rowSize.toLowerCase() === "quarter") rowSize = "Mini";
            if (rowSize !== "" && rowSize !== sz) continue;
            if (mappedCat === "Package") {
                const capacity = Math.max(1, getRatioValue(row));
                totalQuantity += Math.ceil(boxQty / capacity);
            } else {
                totalQuantity += boxQty * getUnitQuantityPerBox(materialName, sz);
            }
        }
        if (totalQuantity <= 0) continue;
        let key = `${materialName}|${row["SAP"]||"-"}|${row["Chinese Description"]||row["Description"]||"-"}`;
        if (mappedCat === "LED Screen") continue;
        let targetArr = resultMap[mappedCat];
        let existing = targetArr.find(item => item.key === key);
        if (existing) existing.qty += totalQuantity;
        else targetArr.push({ key, name: materialName, sap: row["SAP"]||"-", desc: row["Chinese Description"]||row["Description"]||"-", qty: totalQuantity, remark: row["Note"]||"" });
    }
    for (let cat in resultMap) resultMap[cat] = resultMap[cat].map(({name, sap, desc, qty, remark}) => ({name, sap, desc, qty, remark}));
    return resultMap;
}

function getScreenUnitItems() {
    if (!currentModel) return [];
    const items = [];
    const sizeDisplayMap = { "Full": "Full", "Half": "Half", "Edge": "Edge", "Vertical": "Vertical", "Mini": "Quarter" };
    
    for (let [sizeType, boxQty] of Object.entries(sizeQuantities)) {
        if (!boxQty || boxQty <= 0) continue;
        const displaySize = sizeDisplayMap[sizeType] || sizeType;
        
        let matchedRow = null;
        for (let row of rawBomData) {
            let rowModel = row["Product Model"]?.toString().trim();
            if (rowModel !== currentModel) continue;
            
            let rowCat = getMaterialCategory(row);
            if (!PANEL_MATERIAL_CATEGORIES.has(rowCat)) continue;
            
            let rowMat = row["Part Name"] || "";
            let isUnit = rowMat.includes("屏体_Panels");
            if (!isUnit) continue;
            
            let rowSize = row["Size"]?.toString().trim() || "";
            if (rowSize.toLowerCase() === "quarter") rowSize = "Mini";
            if (rowSize !== "" && rowSize !== sizeType) continue;
            
            let rowSys = row["System"]?.toString().trim() || "";
            if (rowSys !== "" && !VALID_SYSTEMS.includes(rowSys)) continue;
            if (rowSys !== "" && rowSys !== currentSystem) continue;
            
            matchedRow = row;
            break;
        }
        
        let sap = matchedRow ? (matchedRow["SAP"] || "-") : (currentModel + "-" + sizeType);
        let desc = matchedRow ? (matchedRow["Chinese Description"] || matchedRow["Description"] || `${currentModel} ${displaySize} 屏体单元`) : `${currentModel} ${displaySize} 标准屏体单元`;
        let remark = `屏体单元 - ${displaySize}尺寸，数量${boxQty}个`;
        
        items.push({
            name: matchedRow ? matchedRow["Part Name"] : `${currentModel} (${displaySize}) 屏体`,
            sap: sap,
            desc: desc,
            qty: boxQty,
            remark: remark
        });
    }
    return items;
}

function getSparePartsByCharge() {
    let freeMap = new Map(), chargedMap = new Map();
    for (let spare of currentSpares) {
        let key = `${spare.物料名称}|${spare.SAP}|${spare.物料描述}`;
        if (spare.免费备品 > 0) {
            if (freeMap.has(key)) freeMap.get(key).qty += spare.免费备品;
            else freeMap.set(key, { name: spare.物料名称, sap: spare.SAP, desc: spare.物料描述, qty: spare.免费备品, remark: spare.备注 || "" });
        }
        if (spare.建议购买 > 0) {
            if (chargedMap.has(key)) chargedMap.get(key).qty += spare.建议购买;
            else chargedMap.set(key, { name: spare.物料名称, sap: spare.SAP, desc: spare.物料描述, qty: spare.建议购买, remark: spare.备注 || "" });
        }
    }
    return { free: Array.from(freeMap.values()), charged: Array.from(chargedMap.values()) };
}

function getPreviewSections() {
    const production = computeProductionMaterials();
    const spares = getSparePartsByCharge();
    return [
        { title: "LED Screen", data: getScreenUnitItems() },
        { title: "Processor", data: production["Processor"] },
        { title: "Cables", data: production["Cables"] },
        { title: "Accessories", data: production["Accessories"] },
        { title: "Package", data: production["Package"] },
        { title: "Spare parts for charged", data: spares.charged },
        { title: "Spare parts for free", data: spares.free }
    ];
}

function safeExcelSheetName(name, index) {
    const clean = (name || `Sheet${index + 1}`).replace(/[\\/?*[\]:]/g, " ").trim().slice(0, 31);
    return clean || `Sheet${index + 1}`;
}

function safeFilePart(value) {
    return (value || "BOM").toString().replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, "").slice(0, 80) || "BOM";
}

function escapeExcelHtml(value) {
    return (value ?? "").toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/\n/g, "<br>");
}

function exportExcel() {
    if (!currentModel) {
        alert("\u8bf7\u5148\u9009\u62e9\u4ea7\u54c1\u578b\u53f7");
        return;
    }
    const sections = getPreviewSections().filter(sec => sec.data && sec.data.length > 0);
    if (!sections.length) {
        alert("\u5f53\u524d\u6ca1\u6709\u53ef\u5bfc\u51fa\u7684\u7269\u6599\u6570\u636e");
        return;
    }
    const rows = [];
    const merges = [];
    sections.forEach(sec => {
        if (rows.length) rows.push([]);
        const titleRow = rows.length;
        rows.push([sec.title || "-"]);
        merges.push({ s: { r: titleRow, c: 0 }, e: { r: titleRow, c: 4 } });
        rows.push(["\u7269\u6599\u540d\u79f0", "SAP", "\u7269\u6599\u63cf\u8ff0", "\u6570\u91cf", "\u5907\u6ce8"]);
        sec.data.forEach(item => {
            rows.push([
                item.name || "-",
                item.sap || "-",
                item.desc || "-",
                Number.isFinite(Number(item.qty)) ? Number(item.qty) : (item.qty || 0),
                item.remark || ""
            ]);
        });
    });
    const filenameBase = "BOM_" + safeFilePart(currentModel);
    if (typeof XLSX !== "undefined") {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws["!merges"] = merges;
        ws["!cols"] = [{ wch: 28 }, { wch: 18 }, { wch: 70 }, { wch: 10 }, { wch: 28 }];
        XLSX.utils.book_append_sheet(wb, ws, "BOM");
        XLSX.writeFile(wb, filenameBase + ".xlsx");
        return;
    }
    const text = rows.map(row => row.map(cell => (cell ?? "").toString().replace(/[\t\r\n]+/g, " ")).join("\t")).join("\n");
    const blob = new Blob(["\ufeff", text], { type: "application/vnd.ms-excel;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = filenameBase + ".xls";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function renderFullPreview() {
    const container = document.getElementById('detailedPreviewContainer');
    const btn = document.getElementById('exportExcelBtn');
    if (!currentModel || Object.values(sizeQuantities).every(v=>v===0)) { container.style.display = 'none'; btn.style.display = 'none'; return; }
    
    const sections = getPreviewSections();
    
    container.style.display = 'block'; btn.style.display = 'block'; container.innerHTML = '';
    for (let sec of sections) {
        if (!sec.data || sec.data.length === 0) continue;
        const sectionDiv = document.createElement('div'); sectionDiv.className = 'material-section';
        sectionDiv.innerHTML = `<div class="section-title">${sec.title}</div>`;
        const table = document.createElement('table'); table.className = 'preview-table';
        table.innerHTML = `<thead><tr><th>物料名称</th><th>SAP</th><th>物料描述</th><th>数量</th><th>备注</th></thead><tbody></tbody>`;
        for (let item of sec.data) {
            const row = table.tBodies[0].insertRow();
            row.insertCell(0).innerText = item.name || '-'; row.insertCell(1).innerText = item.sap || '-';
            row.insertCell(2).innerText = item.desc || '-'; row.insertCell(3).innerText = item.qty;
            row.insertCell(4).innerText = item.remark || '';
        }
        sectionDiv.appendChild(table); container.appendChild(sectionDiv);
    }
}

function computeAndRender() {
    if (!currentModel) return;
    currentSpares = [];
    let totalUnits = 0;
    for (let [sz,qty] of Object.entries(sizeQuantities)){
        if(sz==="Full") totalUnits+=qty; else if(sz==="Half" || sz==="Vertical") totalUnits+=qty*.5; else if(sz==="Mini") totalUnits+=qty*.25; else totalUnits+=qty;
    }
    totalUnits=Math.ceil(totalUnits);
    
    syncToMapping();

    if(totalUnits <= 0 && !customEnabled) { renderFullPreview(); return; }

    let isVoyager=currentModel.toLowerCase().includes("voyager");
    let compatibleRows = rawBomData.filter(row => {
        if (row["Product Model"]?.toString().trim() !== currentModel) return false;
        const materialCategory = getMaterialCategory(row);
        if (!SPARE_FREE_CATEGORIES.has(materialCategory) && !SPARE_CHARGED_CATEGORIES.has(materialCategory)) return false;
        let rowSize = row["Size"]?.toString().trim() || ""; if (rowSize.toLowerCase() === "quarter") rowSize = "Mini";
        if (rowSize !== "" && (!sizeQuantities[rowSize] || sizeQuantities[rowSize] <= 0)) return false;
        let rowSys = row["System"]?.toString().trim() || ""; if (VALID_SYSTEMS.includes(rowSys)) return rowSys === currentSystem;
        return true;
    });

    compatibleRows.forEach(row => {
        let material = row["Part Name"] || "", matLower = material.toLowerCase(), coreType = null;
        if (matLower.includes("模组") || matLower.includes("im")) coreType = "模组";
        else if (matLower.includes("电源") || matLower.includes("psu")) coreType = "电源";
        else if (matLower.includes("转接板") || matLower.includes("hub")) coreType = "转接板";
        else if (matLower.includes("接收卡") || matLower.includes("card") || matLower.includes("receiving")) coreType = "接收卡";
        
        let isAllowedReg = material.includes("面罩") || material.includes("灯珠") || material.includes("驱动IC") || material.includes("行MOS管");
        if (!isVoyager && totalUnits <= 8 && !coreType && !isAllowedReg) return;

        const materialCategory = getMaterialCategory(row);
        const ratio = getRatioValue(row);
        
        let rowSize2 = row["Size"]?.toString().trim() || ""; if (rowSize2.toLowerCase() === "quarter") rowSize2 = "Mini";
        let baseQty = (rowSize2 === "") ? totalUnits : (sizeQuantities[rowSize2] || 0);
        
        let free = 0, buy = 0, remark = row["Note"] || "";
        if (SPARE_FREE_CATEGORIES.has(materialCategory)) {
            if (!isVoyager && totalUnits <= 8 && coreType) {
                free = Math.floor(baseQty * ratio);
                if (free > 0 && !remark) remark = "≤8台核心备品";
            } else {
                free = Math.ceil(baseQty * ratio);
                if (free < 1 && ratio > 0) free = 1;
            }
        } else if (SPARE_CHARGED_CATEGORIES.has(materialCategory)) {
            if (!isVoyager && totalUnits <= 8 && coreType) {
                buy = baseQty * ratio >= 1 ? Math.ceil(baseQty * ratio) : Math.max(1, Math.ceil(baseQty * ratio));
                if (!remark) remark = baseQty * ratio >= 1 ? "≤8台核心备品" : "建议购买1套应急";
            } else {
                buy = Math.ceil(baseQty * ratio);
                if (buy < 1 && ratio > 0) buy = 1;
            }
        } else {
            return;
        }
        
        if (isDemo && (material.includes("灯珠") || material.includes("面罩"))) free *= 10;
        if (free > 0 || buy > 0) currentSpares.push({ 产品型号: currentModel, 物料名称: material, SAP: row["SAP"]||"-", 物料描述: row["Chinese Description"]||row["Description"]||"-", 免费备品: free, 建议购买: buy, 备注: remark });
    });

    if(customEnabled && urcCount > 0){
        EMERGENCY_ITEMS.forEach(item => {
            let freeQty = 0, buyQty = 0, rem = "URC附加计算";
            if(urcCount <= 8) { buyQty = 1; rem = "异形≤8台建议购买一套"; }
            else { freeQty = Math.max(1, Math.ceil(urcCount * (item.name.includes("PSU") ? 0.005 : 0.01))); }
            currentSpares.push({ 产品型号: "URC异形", 物料名称: item.name, SAP: "-", 物料描述: "URC备品", 免费备品: freeQty, 建议购买: buyQty, 备注: rem });
        });
    }
    renderFullPreview();
}

function updateBandwidthOptions() {
    const bwSelect = document.getElementById('bandwidthSelect');
    let availableBw = ['1G']; 
    if (currentSystem === 'Nova') {
        const has5G = rawBomData.some(row => row['Product Model']?.toString().trim() === currentModel && row['System'] === 'Nova' && row['Bandwidth'] === '5G');
        if (has5G) availableBw = ['5G', '1G'];
    } else if (currentSystem === 'MVR') {
        const has25G = rawBomData.some(row => row['Product Model']?.toString().trim() === currentModel && row['System'] === 'MVR' && row['Bandwidth'] === '2.5G');
        if (has25G) availableBw = ['2.5G', '1G'];
    }
    bwSelect.innerHTML = availableBw.map(bw => `<option value="${bw}">${bw}</option>`).join('');
    currentBandwidth = availableBw[0];
    bwSelect.value = currentBandwidth;
    syncToMapping();
}

document.getElementById('bandwidthSelect').addEventListener('change', (e) => {
    currentBandwidth = e.target.value;
    syncToMapping();
});

document.getElementById('mappingToggle').addEventListener('change', (e) => {
    document.getElementById('mappingWrapper').style.display = e.target.checked ? 'block' : 'none';
    if (e.target.checked) syncToMapping();
});

document.getElementById('mappingFrame').onload = function() {
    syncToMapping();
};

function renderMatrixIcon(sizeType){
    const div=document.createElement('div'); div.className='size-matrix';
    if(sizeType==="Full") div.innerHTML=`<div class="matrix-row"><span class="matrix-cell"></span><span class="matrix-cell"></span></div><div class="matrix-row"><span class="matrix-cell"></span><span class="matrix-cell"></span></div>`;
    else if(sizeType==="Half") div.innerHTML=`<div class="matrix-row"><span class="matrix-cell"></span><span class="matrix-cell"></span></div>`;
    else if(sizeType==="Edge") div.innerHTML=`<div class="matrix-row"><span class="matrix-cell"></span><span style="width:22px;height:22px;border-radius:4px;"></span></div><div class="matrix-row"><span class="matrix-cell"></span><span class="matrix-cell"></span></div>`;
    else if(sizeType==="Vertical") div.innerHTML=`<div class="matrix-row"><span class="matrix-cell"></span></div><div class="matrix-row"><span class="matrix-cell"></span></div>`;
    else div.innerHTML=`<div class="matrix-row"><span class="matrix-cell"></span></div>`;
    return div;
}

function buildTree(data){
    let tree={}; let modelSet=new Set();
    data.forEach(row=>{ 
        const materialCategory = getMaterialCategory(row);
        const productCategory = row["Product Category"]?.toString().trim() || "";
        if (PROCESSOR_MATERIAL_CATEGORIES.has(materialCategory) || PROCESSOR_MATERIAL_CATEGORIES.has(productCategory)) return;
        let model=row["Product Model"]?.toString().trim(); if(model) modelSet.add(model);
        let cat=row["Product Category"] || "未分类"; let pname=row["Product Name"] || "未命名";
        if(!tree[cat])tree[cat]={}; if(!tree[cat][pname])tree[cat][pname]=new Set();
        tree[cat][pname].add(model);
    });
    uniqueModels=Array.from(modelSet).sort();
    let html='';
    for(let [cat,products] of Object.entries(tree)){
        html+=`<div class="category-group"><div class="category-title">📁 ${cat}</div><div class="products-container collapsed">`;
        for(let [pname,models] of Object.entries(products)){
            html+=`<div class="product-item"><div class="product-header">📌 ${pname}</div><div class="model-list collapsed">`;
            models.forEach(m=>{ html+=`<span class="model-chip" data-model="${m}">🔍 ${m}</span>`; });
            html+=`</div></div>`;
        }
        html+=`</div></div>`;
    }
    document.getElementById('dropdownPanel').innerHTML=html;
    document.querySelectorAll('.category-title').forEach(el=>el.addEventListener('click',()=>el.nextElementSibling.classList.toggle('collapsed')));
    document.querySelectorAll('.product-header').forEach(el=>el.addEventListener('click',()=>el.nextElementSibling.classList.toggle('collapsed')));
    document.querySelectorAll('.model-chip').forEach(chip=>chip.addEventListener('click',()=>{ selectModelAndUpdate(chip.dataset.model); document.getElementById('dropdownPanel').classList.add('collapsed'); }));
}

function updateSystemOptions(model){
    let systems=new Set();
    rawBomData.forEach(row=>{ if(row["Product Model"]?.toString().trim()===model && VALID_SYSTEMS.includes(row["System"]?.toString().trim())) systems.add(row["System"]?.toString().trim()); });
    document.getElementById('systemSelect').innerHTML=Array.from(systems).sort().map(sys=>`<option value="${sys}">${sys}</option>`).join('');
    currentSystem=Array.from(systems)[0] || "";
    document.getElementById('systemSelect').value=currentSystem;
    updateBandwidthOptions(); 
}

function getModelSizes(model){
    let sizes=new Set();
    rawBomData.forEach(row=>{
        if(row["Product Model"]?.toString().trim()!==model) return;
        if(!PANEL_MATERIAL_CATEGORIES.has(getMaterialCategory(row))) return;
        let s=normalizeSizeName(row["Size"]);
        if(s) sizes.add(s);
    });
    if(sizes.size===0) sizes.add("Full");
    const SIZE_ORDER = ["Full","Half","Edge","Vertical","Mini"];
    return Array.from(sizes).sort((a,b)=>{
        const ai = SIZE_ORDER.indexOf(a);
        const bi = SIZE_ORDER.indexOf(b);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
}

function renderSizeCards(sizes){
    const container = document.getElementById('dynamicSizesContainer');
    container.innerHTML='';
    let grid=document.createElement('div'); grid.className='size-grid';
    sizes.forEach(sz=>{
        let card=document.createElement('div'); card.className='size-card';
        let displaySize = (sz === "Mini") ? "Quarter" : sz;
        card.innerHTML = `<div class="size-label">${currentModel} (${displaySize})</div>`;
        card.appendChild(renderMatrixIcon(sz));
        let inp=document.createElement('input'); inp.type='number'; inp.min=0; inp.value=0; inp.className='size-input';
        inp.addEventListener('input',e=>{ let v=parseInt(e.target.value,10)||0; sizeQuantities[sz]=v; computeAndRender(); });
        card.appendChild(inp); grid.appendChild(card);
    });
    container.appendChild(grid);
}

function selectModelAndUpdate(model){
    currentModel=model; 
    document.getElementById('productSearchInput').value=model; 
    document.getElementById('selectedModelDisplay').innerText=`📌 当前型号：${model}`;
    updateSystemOptions(model);
    let sizes=getModelSizes(model);
    sizeQuantities={}; sizes.forEach(s=>sizeQuantities[s]=0);
    renderSizeCards(sizes);
    document.getElementById('quantityPanel').style.display="block";
    computeAndRender();
}

document.getElementById('productSearchInput').addEventListener('input',(e)=>{
    let q=e.target.value.trim().toLowerCase();
    const suggestionArea = document.getElementById('suggestionArea');
    if(!q){ suggestionArea.style.display='none'; return; }
    let matched=uniqueModels.filter(m=>m.toLowerCase().includes(q)).slice(0,10);
    suggestionArea.innerHTML=matched.map(m=>`<span class="suggestion-tag" data-model="${m}">🔍 ${m}</span>`).join('');
    suggestionArea.style.display=matched.length?'flex':'none';
    document.querySelectorAll('.suggestion-tag').forEach(tag=>tag.addEventListener('click',()=>{ selectModelAndUpdate(tag.dataset.model); suggestionArea.style.display='none'; }));
});

document.getElementById('dropdownToggleBtn').addEventListener('click',()=>document.getElementById('dropdownPanel').classList.toggle('collapsed'));
document.getElementById('systemSelect').addEventListener('change',(e)=>{ currentSystem=e.target.value; updateBandwidthOptions(); computeAndRender(); });
document.getElementById('demoCheckbox').addEventListener('change',(e)=>{ isDemo=e.target.checked; computeAndRender(); });
document.getElementById('customCheckbox').addEventListener('change',e=>{ customEnabled=e.target.checked; document.getElementById('urcInputWrapper').style.display=customEnabled?'block':'none'; computeAndRender(); });
document.getElementById('urcCount').addEventListener('input',e=>{ urcCount=parseInt(e.target.value,10)||0; computeAndRender(); });
document.getElementById('exportExcelBtn').addEventListener('click', exportExcel);

// 加载数据
fetch('Spare_Parts.json').then(res=>res.json()).then(data=>{ rawBomData=data; buildTree(data); });
</script>
