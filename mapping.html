/* 调整后的 toggle-item： ?终带有底色，宽度 ?? 应 */
.toggle-item { 
    display: flex; 
    align-items: center; 
    justify-content: flex-start; 
    gap: 8px; 
    /* 始终保持 ?   ?*/
    background: rgba(34, 211, 238, 0.1); 
    padding: 8px 14px; 
    border-radius: 28px; 
    width: fit-content;          /* 宽度随内容自适应 */
    white-space: nowrap;         /* 强制文字不换 ?*/
    border: 1px solid rgba(34, 211, 238, 0.3); 
    cursor: pointer; 
    font-size: 0.8rem; 
    transition: 0.2s;
    color: #eef2ff;
}

/*  ?   */
.toggle-item:hover {
    background: rgba(34, 211, 238, 0.2);
    border-color: #22d3ee;
}

/* 勾 ? 后 */
.toggle-item:has(input:checked) {
    background: rgba(253, 230, 138, 0.18);
    border-color: #fde68a;
    color: #fde68a;
}

/* 勾 ? 后 ?   */
.toggle-item:has(input:checked):hover {
    background: rgba(253, 230, 138, 0.25);
    border-color: #facc15;
}

        .stats-grid { display:grid; grid-template-columns:repeat(5,minmax(150px,1fr)); gap:10px; margin-bottom:18px; background:#0f1320; border-radius:20px; padding:14px; }

function getControllerTone(index) {
    const tone = CONTROLLER_COLOR_PRESETS[(index - 1) % CONTROLLER_COLOR_PRESETS.length];
    const cycle = Math.floor((index - 1) / CONTROLLER_COLOR_PRESETS.length);
    return {
        h: tone.h,
        s: Math.max(0, Math.min(100, tone.s - cycle * 4)),
        l: Math.max(24, Math.min(92, tone.l + cycle * 3))
    };
}

function controllerBorderColor(index) {
    const tone = getControllerTone(index);
    if (tone.s === 0) return `hsl(0, 0%, ${tone.l}%)`;
    return `hsl(${tone.h}, ${tone.s}%, ${tone.l}%)`;
}

function isSingleControllerMode() {
    if (_lastControllerPlan?.controllerSummaries?.length) return _lastControllerPlan.controllerSummaries.length === 1;
    if (lastMatrix?.length) return new Set(lastMatrix.flat().map(cell => cell.controllerId || 1)).size === 1;
    return false;
}

function portFillColor(index, portIndex, rowIndex = 0, colIndex = 0, direction = null, context = 'processor') {
    const safePort = Number.isFinite(portIndex) ? portIndex : 0;
    if (isSingleControllerMode()) {
        if (context === 'topology') return 'transparent';
        return safePort % 2 === 0 ? 'hsla(205, 86%, 54%, 0.18)' : 'hsla(205, 72%, 42%, 0.30)';
    }
    const tone = getControllerTone(index);
    const variant = safePort % 4;
    const cycleLift = Math.floor(safePort / 4) % 2;
    const tones = [
        { l: 50, s: 62, h: -3 },
        { l: 66, s: 58, h: 2 },
        { l: 55, s: 60, h: -2 },
        { l: 70, s: 54, h: 3 },
    ];
    const c = tones[variant] || tones[0];
    const lightness = Math.max(28, Math.min(82, c.l + cycleLift * 2));
    const saturation = Math.max(24, Math.min(82, Math.round(tone.s * 0.58 + c.s * 0.42)));
    if (tone.s === 0) return `hsl(210, ${Math.max(22, c.s - 10)}%, ${lightness}%)`;
    return `hsl(${(tone.h + c.h + 360) % 360}, ${saturation}%, ${lightness}%)`;
}

function powerMappingTone(labelOrId) {
    const match = (labelOrId || '').toString().match(/P(\d+)/);
    const index = match ? Math.max(0, parseInt(match[1], 10) - 1) : 0;
    const filled = index % 2 === 0;
    const cycle = Math.floor(index / 2) % 3;
    const lineLightness = [47, 42, 52][cycle];
    const borderLightness = [68, 62, 72][cycle];
    return {
        fill: filled ? 'hsla(4, 78%, 55%, 0.18)' : 'transparent',
        border: `hsl(4, 74%, ${borderLightness}%)`,
        line: `hsl(4, 82%, ${lineLightness}%)`
    };
}

    const allowed = getAllowedMasterCanvases();
    const preferredKey = getPreferredMasterCanvasKey();
    canvasSelect.innerHTML = '';
    allowed.forEach(item => {
        canvasSelect.add(new Option(item.label, item.key));
    });
    const hasPreferred = allowed.some(item => item.key === preferredKey);
    const hasPrevious = allowed.some(item => item.key === previousValue);
    if (!_masterCanvasManualOverride && hasPreferred) {
        canvasSelect.value = preferredKey;
    } else if (hasPrevious) {

    } else if (hasPreferred) {

function getPowerLoadSummary() {
    const unitPower = getFullPower();
    const capacity = getMaxPowerLoad();
    const loads = new Map();
    if (lastMatrix?.length) {
        lastMatrix.flat().forEach(cell => {
            const id = (cell.powerLabel || '').split('-')[0];
            if (!id) return;
            const load = cell.type === "Half" ? unitPower * 0.5 : unitPower;
            loads.set(id, (loads.get(id) || 0) + load);
        });
    }
    const feedCount = loads.size || 0;
    const totalLoad = [...loads.values()].reduce((sum, value) => sum + value, 0);
    const averageLoad = feedCount ? totalLoad / feedCount : 0;
    const peakLoad = feedCount ? Math.max(...loads.values()) : 0;
    return {
        feedCount,
        totalLoad,
        averageLoad,
        peakLoad,
        capacity,
        cabinetMax: unitPower,
        cabinetTypical: unitPower * 0.4,
        utilization: capacity ? (peakLoad / capacity) * 100 : 0
    };
}

            const itemX = ix + colIndex * (cardW / 2) + 2;
            const step = entries.length >= 3 ? 3.8 : 5.5;
            const startY = y + (entries.length >= 3 ? 3 : 4.2);
            entries.forEach((item, entryIndex) => drawEntry(item, itemX, startY + entryIndex * step, colW));
        });
    });
    return h;
}

function findBestRectangle(totalFull, pixelW, pixelH) {
    if (totalFull <= 0) return { cols: 1, rows: 1 };
    let bestCols = 1, bestRows = 1, bestDiff = Infinity;
    for (let cols = 1; cols <= totalFull; cols++) {
        let rows = Math.floor(totalFull / cols);
        if (rows < 1) continue;
        let ratio = (cols * pixelW) / (rows * pixelH);
        let diff = Math.abs(ratio - 16/9);
        if (diff < bestDiff) { bestDiff = diff; bestCols = cols; bestRows = rows; }
    }
    while (bestCols * bestRows > totalFull && bestRows > 1) bestRows--;
    return { cols: bestCols, rows: bestRows };
}

// ======================= 基于真实物理负载 ?  的核心走线算 ?=======================
function assignLabelsByStrictRule(matrix, maxCap, unitCap, pathType, prefix, direction, maxPanelCount = Infinity) {
    const rows = matrix.length;
    const cols = matrix[0].length;
    const labels = Array(rows).fill().map(() => Array(cols).fill(''));
    const countLimited = Number.isFinite(maxPanelCount);
    const getLoad = (r, c) => matrix[r][c].type === "Half" ? (unitCap * 0.5) : unitCap;
    const getPanelCount = (r, c) => matrix[r][c].type === "Half" ? 0.5 : 1;
    const overLimit = (load, count) => load > maxCap || (countLimited && count > maxPanelCount);
    const expectedSplits = (load, count) => Math.max(
        Math.ceil(load / Math.max(1, maxCap)),
        countLimited ? Math.ceil(count / Math.max(0.5, maxPanelCount)) : 1
    );
    const sumColumn = (c) => {
        let load = 0, count = 0;
        for (let r = 0; r < rows; r++) { load += getLoad(r, c); count += getPanelCount(r, c); }
        return { load, count };
    };
    const sumRow = (r) => {
        let load = 0, count = 0;
        for (let c = 0; c < cols; c++) { load += getLoad(r, c); count += getPanelCount(r, c); }
        return { load, count };
    };
    const sumAll = () => {
        let load = 0, count = 0;
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) { load += getLoad(r, c); count += getPanelCount(r, c); }
        return { load, count };
    };

    if (direction === 'vertical') {
        let maxCol = { load: 0, count: 0 };
        for (let c = 0; c < cols; c++) {
            const col = sumColumn(c);
            if (overLimit(col.load, col.count) || col.load > maxCol.load || col.count > maxCol.count) maxCol = col;
        }

        if (overLimit(maxCol.load, maxCol.count)) {
            let cableId = 1;
            for (let c = 0; c < cols; c++) {
                const col = sumColumn(c);
                const expectedK = expectedSplits(col.load, col.count);
                let rowSplits = [];
                let rIdx = 0, remainingRows = rows;
                while (remainingRows > 0) {
                    const currentK = Math.max(1, expectedK - rowSplits.length);
                    const targetSize = Math.ceil(remainingRows / currentK);
                    let actualSize = 0, chunkLoad = 0, chunkCount = 0;
                    for (let j = 0; j < targetSize; j++) {
                        if (rIdx + j >= rows) break;
                        const nextLoad = getLoad(rIdx + j, c);
                        const nextCount = getPanelCount(rIdx + j, c);
                        if (actualSize > 0 && overLimit(chunkLoad + nextLoad, chunkCount + nextCount)) break;
                        chunkLoad += nextLoad;
                        chunkCount += nextCount;
                        actualSize++;
                    }
                    if (actualSize === 0) actualSize = 1;
                    let chunk = [];
                    for (let j = 0; j < actualSize; j++) chunk.push(rIdx++);
                    rowSplits.push(chunk);
                    remainingRows -= actualSize;
                }
                for (let chunk of rowSplits) {
                    let seq = 1;
                    for (let r of chunk) labels[r][c] = `${prefix}${cableId}-${seq++}`;
                    cableId++;
                }
            }
        } else {
            const total = sumAll();
            const expectedK = expectedSplits(total.load, total.count);
            let colChunks = [];
            let cIdx = 0, remainingCols = cols;
            while (remainingCols > 0) {
                const currentK = Math.max(1, expectedK - colChunks.length);
                const targetSize = Math.ceil(remainingCols / currentK);
                let actualSize = 0, chunkLoad = 0, chunkCount = 0;
                for (let j = 0; j < targetSize; j++) {
                    if (cIdx + j >= cols) break;
                    const col = sumColumn(cIdx + j);
                    if (actualSize > 0 && overLimit(chunkLoad + col.load, chunkCount + col.count)) break;
                    chunkLoad += col.load;
                    chunkCount += col.count;
                    actualSize++;
                }
                if (actualSize === 0) actualSize = 1;
                let chunk = [];
                for (let j = 0; j < actualSize; j++) chunk.push(cIdx++);
                colChunks.push(chunk);
                remainingCols -= actualSize;
            }
            let cableId = 1;
            for (let chunk of colChunks) {
                let seq = 1, currentDir = 1;
                for (let c of chunk) {
                    if (pathType === 'N') currentDir = 1;
                    else if (seq === 1) currentDir = 1;
                    else currentDir = -currentDir;
                    let rOrder = [];
                    if (currentDir === 1) for (let r = 0; r < rows; r++) rOrder.push(r);
                    else for (let r = rows - 1; r >= 0; r--) rOrder.push(r);
                    for (let r of rOrder) labels[r][c] = `${prefix}${cableId}-${seq++}`;
                }
                cableId++;
            }
        }
    } else {
        let maxRow = { load: 0, count: 0 };
        for (let r = 0; r < rows; r++) {
            const row = sumRow(r);
            if (overLimit(row.load, row.count) || row.load > maxRow.load || row.count > maxRow.count) maxRow = row;
        }

        if (overLimit(maxRow.load, maxRow.count)) {
            let cableId = 1;
            for (let r = 0; r < rows; r++) {
                const row = sumRow(r);
                const expectedK = expectedSplits(row.load, row.count);
                let colSplits = [];
                let cIdx = 0, remainingCols = cols;
                while (remainingCols > 0) {
                    const currentK = Math.max(1, expectedK - colSplits.length);
                    const targetSize = Math.ceil(remainingCols / currentK);
                    let actualSize = 0, chunkLoad = 0, chunkCount = 0;
                    for (let j = 0; j < targetSize; j++) {
                        if (cIdx + j >= cols) break;
                        const nextLoad = getLoad(r, cIdx + j);
                        const nextCount = getPanelCount(r, cIdx + j);
                        if (actualSize > 0 && overLimit(chunkLoad + nextLoad, chunkCount + nextCount)) break;
                        chunkLoad += nextLoad;
                        chunkCount += nextCount;
                        actualSize++;
                    }
                    if (actualSize === 0) actualSize = 1;
                    let chunk = [];
                    for (let j = 0; j < actualSize; j++) chunk.push(cIdx++);
                    colSplits.push(chunk);
                    remainingCols -= actualSize;
                }
                for (let chunk of colSplits) {
                    let seq = 1;
                    for (let c of chunk) labels[r][c] = `${prefix}${cableId}-${seq++}`;
                    cableId++;
                }
            }
        } else {
            const total = sumAll();
            const expectedK = expectedSplits(total.load, total.count);
            let rowChunks = [];
            let rIdx = 0, remainingRows = rows;
            while (remainingRows > 0) {
                const currentK = Math.max(1, expectedK - rowChunks.length);
                const targetSize = Math.ceil(remainingRows / currentK);
                let actualSize = 0, chunkLoad = 0, chunkCount = 0;
                for (let j = 0; j < targetSize; j++) {
                    if (rIdx + j >= rows) break;
                    const row = sumRow(rIdx + j);
                    if (actualSize > 0 && overLimit(chunkLoad + row.load, chunkCount + row.count)) break;
                    chunkLoad += row.load;
                    chunkCount += row.count;
                    actualSize++;
                }
                if (actualSize === 0) actualSize = 1;
                let chunk = [];
                for (let j = 0; j < actualSize; j++) chunk.push(rIdx++);
                rowChunks.push(chunk);
                remainingRows -= actualSize;
            }
            let cableId = 1;
            for (let chunk of rowChunks) {
                let seq = 1, currentDir = 1;
                for (let r of chunk) {
                    if (pathType === 'N') currentDir = 1;
                    else if (seq === 1) currentDir = 1;
                    else currentDir = -currentDir;
                    let cOrder = [];
                    if (currentDir === 1) for (let c = 0; c < cols; c++) cOrder.push(c);
                    else for (let c = cols - 1; c >= 0; c--) cOrder.push(c);
                    for (let c of cOrder) labels[r][c] = `${prefix}${cableId}-${seq++}`;
                }
                cableId++;
            }
        }
    }
    return labels;
}

function sumRowPixelHeight(matrix, startRow, rowCount) {
    let total = 0;
    for (let r = startRow; r < startRow + rowCount; r++) {
        total += matrix[r]?.[0]?.pixelH || currentProductObj.pixelH;
    }
    return total;
}

function getRowsThatFitCanvas(matrix, startRow, availableRows, canvasHeight) {
    let totalHeight = 0;
    let count = 0;
    for (let r = startRow; r < startRow + availableRows; r++) {
        let rowHeight = matrix[r]?.[0]?.pixelH || currentProductObj.pixelH;
        if (count > 0 && totalHeight + rowHeight > canvasHeight) break;
        totalHeight += rowHeight;
        count++;
        if (totalHeight >= canvasHeight) break;
    }
    return Math.max(1, count);
}

// ======================= 辅助：将行均 ?切分为条 ?=======================
function splitRowsIntoStrips(matrix, stripCount, maxHeight) {
    const rows = matrix.length;
    if (stripCount > rows || stripCount < 1) return null;
    let strips = [];
    let r = 0, remaining = rows;
    for (let i = 0; i < stripCount; i++) {
        let takeRows = Math.ceil(remaining / (stripCount - i));
        //  ?  该条带不超出画布高度
        let stripH = sumRowPixelHeight(matrix, r, takeRows);
        if (stripH > maxHeight) {
            takeRows = getRowsThatFitCanvas(matrix, r, remaining, maxHeight);
            if (takeRows <= 0) return null;
        }
        strips.push({ r, rows: takeRows, height: sumRowPixelHeight(matrix, r, takeRows) });
        r += takeRows;
        remaining -= takeRows;
    }
    return strips;
}

// ======================= 主控画布条带拼贴算法 =======================
// Legacy strip-tiling planner kept for compatibility.
function buildControllerCanvasPlanLegacyUnused(matrix, canvas) {
    const rows = matrix.length;
    const cols = matrix[0].length;
    const unitWidth = currentProductObj.pixelW || 1;
    const canvasPixels = canvas.width * canvas.height;
    const maxCols = Math.max(1, Math.floor(canvas.width / unitWidth));
    const maxRows = getRowsThatFitCanvas(matrix, 0, rows, canvas.height);

    // ---- 计算 ?少需要的条带 ?(基于画布高度) ----
    let minStrips = 1, accH = 0;
    for (let r = 0; r < rows; r++) {
        const rh = matrix[r][0]?.pixelH || currentProductObj.pixelH;
        if (accH > 0 && accH + rh > canvas.height) { minStrips++; accH = 0; }
        accH += rh;
    }

    // ---- 辅助：求矩形像素高度 ----
    function piecePixelH(rStart, nRows) {
        return sumRowPixelHeight(matrix, rStart, nRows);
    }

    // ---- 辅助：由控制器列表 ?算评 ?----
    function evaluate(controllers) {
        const count = controllers.length;
        let utilSum = 0, utilMin = 1;
        for (const ctrl of controllers) {
            let ctrlArea = 0;
            for (const p of ctrl.pieces) {
                const w = p.cols * unitWidth;
                const h = piecePixelH(p.r, p.rows);
                ctrlArea += w * h;
            }
            const u = ctrlArea / canvasPixels;
            utilSum += u;
            if (u < utilMin) utilMin = u;
        }
        return { count, avgUtil: utilSum / Math.max(1, count), minUtil: utilMin };
    }

    // ---- 策略 A：条带拼 ?(cols  ?maxCols 时可 ? ----
    function tryStripTiling() {
        if (cols > maxCols) return null; // 单条带 ?度已超画布， ?回货架算 ?
        const stripsPerCanvasRow = Math.floor(maxCols / cols);
        if (stripsPerCanvasRow <= 0) return null;

        // Try from the minimum strip count and keep the smallest controller count.
        let best = null;
        for (let stripCount = minStrips; stripCount <= rows; stripCount++) {
            const strips = splitRowsIntoStrips(matrix, stripCount, canvas.height);
            if (!strips) continue;
            const canvasesNeeded = Math.ceil(stripCount / stripsPerCanvasRow);
            if (!best || canvasesNeeded < best.canvasesNeeded ||
                (canvasesNeeded === best.canvasesNeeded && stripCount < best.stripCount)) {
                best = { strips, stripCount, canvasesNeeded, stripsPerCanvasRow };
            }
            if (canvasesNeeded === 1 && stripCount === minStrips) break; //  ?优：1 主控
        }
        if (!best) return null;

        // Build controllers.
        let controllers = [];
        let cid = 1, idx = 0;
        while (idx < best.strips.length) {
            let pieces = [];
            for (let k = 0; k < best.stripsPerCanvasRow && idx < best.strips.length; k++, idx++) {
                const s = best.strips[idx];
                pieces.push({ r: s.r, c: 0, rows: s.rows, cols: cols, controllerId: cid });
            }
            controllers.push({ id: cid, pieces });
            cid++;
        }
        return { controllers, canvasesNeeded: best.canvasesNeeded };
    }

    // ---- 策略 B：水平货 ?(按 ?分组→每行从左到右填 ? ----
    function packHorizontal() {
        let controllers = [];
        let cid = 1, r = 0;
        while (r < rows) {
            let shelfRows = 0, shelfH = 0;
            while (r + shelfRows < rows) {
                const rh = matrix[r + shelfRows][0]?.pixelH || currentProductObj.pixelH;
                if (shelfRows > 0 && shelfH + rh > canvas.height) break;
                shelfH += rh; shelfRows++;
                if (shelfH >= canvas.height) break;
            }
            if (shelfRows === 0) shelfRows = 1;
            let c = 0;
            while (c < cols) {
                const takeCols = Math.min(maxCols, cols - c);
                controllers.push({ id: cid++, pieces: [{ r, c, rows: shelfRows, cols: takeCols }] });
                c += takeCols;
            }
            r += shelfRows;
        }
        return controllers;
    }

    // ---- 策略 C：垂直货 ?(按列分组→每列从上到下填 ? ----
    function packVertical() {
        let controllers = [];
        let cid = 1, c = 0;
        while (c < cols) {
            const stripCols = Math.min(maxCols, cols - c);
            let r = 0;
            while (r < rows) {
                let takeRows = 0, h = 0;
                while (r + takeRows < rows) {
                    const rh = matrix[r + takeRows][0]?.pixelH || currentProductObj.pixelH;
                    if (takeRows > 0 && h + rh > canvas.height) break;
                    h += rh; takeRows++;
                    if (h >= canvas.height) break;
                }
                if (takeRows === 0) takeRows = 1;
                controllers.push({ id: cid++, pieces: [{ r, c, rows: takeRows, cols: stripCols }] });
                r += takeRows;
            }
            c += stripCols;
        }
        return controllers;
    }

    // ---- 执 ? ?有策略，选最 ?----
    let candidates = [];

    // 条带拼贴 (优先，因为能减少主控 ?
    const tiled = tryStripTiling();
    if (tiled) {
        candidates.push({
            controllers: tiled.controllers,
            eval: evaluate(tiled.controllers),
            orientation: 'tiled'
        });
    }

    // 水平货架
    const hPlan = packHorizontal();
    candidates.push({ controllers: hPlan, eval: evaluate(hPlan), orientation: 'horizontal' });

    // 垂直货架
    const vPlan = packVertical();
    candidates.push({ controllers: vPlan, eval: evaluate(vPlan), orientation: 'vertical' });

    // 选最优：主控数最 ? ?利用率最 ? ? ?低利用率块最 ?
    candidates.sort((a, b) => {
        if (a.eval.count !== b.eval.count) return a.eval.count - b.eval.count;
        if (Math.abs(a.eval.avgUtil - b.eval.avgUtil) > 0.001) return b.eval.avgUtil - a.eval.avgUtil;
        return b.eval.minUtil - a.eval.minUtil;
    });

    const best = candidates[0];
    best.controllers.forEach(ctrl => {
        ctrl.pieces.forEach(p => p.controllerId = ctrl.id);
    });

    return {
        controllers: best.controllers,
        maxCols, maxRows, canvasPixels,
        orientation: best.orientation,
        utilization: best.eval.avgUtil,
        minUtilization: best.eval.minUtil
    };
}

function offsetPortLabel(label, offset) {
    return label.replace(/^D(\d+)-(\d+)$/, (_, portId, seq) => `D${parseInt(portId, 10) + offset}-${seq}`);
}

function getMaxPortId(labels) {
    let maxId = 0;
    for (let row of labels) {
        for (let label of row) {
            let match = label.match(/^D(\d+)-/);
            if (match) maxId = Math.max(maxId, parseInt(match[1], 10));
        }
    }
    return maxId;
}

function assignPortLabelsByControllerCanvas(matrix, maxCap, unitCap, direction) {
    const canvas = getCurrentMasterCanvas();
    const plan = buildControllerCanvasPlan(matrix, canvas);
    const rows = matrix.length;
    const cols = matrix[0].length;
    let labels = Array(rows).fill().map(() => Array(cols).fill(''));
    let controllerIds = Array(rows).fill().map(() => Array(cols).fill(0));
    let controllerSummaries = [];
    let globalPortOffset = 0;

    for (let controller of plan.controllers) {
        let controllerPortCount = 0;
        for (let piece of controller.pieces) {
            let subMatrix = [];
            for (let r = piece.r; r < piece.r + piece.rows; r++) {
                let row = [];
                for (let c = piece.c; c < piece.c + piece.cols; c++) row.push(matrix[r][c]);
                subMatrix.push(row);
            }

            let localLabels = assignLabelsByStrictRule(subMatrix, maxCap, unitCap, 'S', 'D', direction);
            let localMaxPortId = getMaxPortId(localLabels);
            let labelOffset = globalPortOffset + controllerPortCount;
            for (let r = 0; r < piece.rows; r++) {
                for (let c = 0; c < piece.cols; c++) {
                    labels[piece.r + r][piece.c + c] = offsetPortLabel(localLabels[r][c], labelOffset);
                    controllerIds[piece.r + r][piece.c + c] = controller.id;
                }
            }
            controllerPortCount += localMaxPortId;
        }
        globalPortOffset += controllerPortCount;
        controllerSummaries.push({ id: controller.id, portCount: controllerPortCount, pieces: controller.pieces.length });
    }

    return {
        labels,
        controllerIds,
        controllerSummaries,
        controllers: plan.controllers,
        canvas,
        maxCols: plan.maxCols,
        maxRows: plan.maxRows,
        orientation: plan.orientation,
        utilization: plan.utilization,
        minUtilization: plan.minUtilization,
        // 透传完整 plan 数据 ?processor canvas 渲染
        _rawPlan: {
            controllers: plan.controllers,
            orientation: plan.orientation,
            maxCols: plan.maxCols,
            maxRows: plan.maxRows
        }
    };
}

function computeSystem() {
    let totalFull = _fullCount;
    if (totalFull <= 0) {
        document.getElementById('cabVisual').innerHTML = '<div style="padding:30px;">&#9203; &#31561;&#24453;&#22791;&#21697;&#31995;&#32479;&#25512;&#36865;&#25968;&#25454; (postMessage SYNC_MAPPING)...</div>';
        document.getElementById('statsGrid').innerHTML = '';
        return;
    }
    let colsInput = document.getElementById('customCols');
    let rowsInput = document.getElementById('customRows');
    let useCols = parseInt(colsInput.value, 10) || 1;
    let useRows = parseInt(rowsInput.value, 10) || 1;
    let warnDiv = document.getElementById('dimensionWarning');
    if (useCols * useRows > totalFull) {
        colsInput.classList.add('input-error'); rowsInput.classList.add('input-error');
        warnDiv.style.display = 'block';
        return;
    } else {
        colsInput.classList.remove('input-error'); rowsInput.classList.remove('input-error');
        warnDiv.style.display = 'none';
    }
    
    let hasHalfRow = document.getElementById('addHalfRowCheckbox').checked;
    let matrix = [];
    let w = currentProductObj.pixelW;
    let h = currentProductObj.pixelH;
    for (let r = 0; r < useRows; r++) {
        let rowArr = [];
        for (let c = 0; c < useCols; c++) rowArr.push({ type: "Full", pixelW: w, pixelH: h });
        matrix.push(rowArr);
    }
    if (hasHalfRow) {
        let halfArr = [];
        for (let c = 0; c < useCols; c++) halfArr.push({ type: "Half", pixelW: w, pixelH: Math.floor(h/2) });
        matrix.push(halfArr);
    }
    
    let maxPower = getMaxPowerLoad(), unitPower = getFullPower();
    let maxPixels = getMaxPortPixels(), unitPixels = getFullPixelArea();
    let direction = document.getElementById('routeDirectionSelect').value;
    
    // Assign power labels.
    let powerLabels = assignLabelsByStrictRule(matrix, maxPower, unitPower, 'N', 'P', direction, MAX_PANELS_PER_POWER_FEED);
    let portPlan = assignPortLabelsByControllerCanvas(matrix, maxPixels, unitPixels, direction);
    let portLabels = portPlan.labels;
    let controllerIds = portPlan.controllerIds;
    
    // 计算并统计真实物理负 ?(功率和像素面 ?   ?
    let powerLoadMap = new Map();
    let portLoadMap = new Map();
    
    for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[0].length; c++) {
            let pId = powerLabels[r][c].split('-')[0];
            let dId = `M${controllerIds[r][c]}-${portLabels[r][c].split('-')[0]}`;
            
            let loadPower = matrix[r][c].type === "Half" ? (unitPower * 0.5) : unitPower;
            let loadPixels = matrix[r][c].type === "Half" ? (unitPixels * 0.5) : unitPixels;
            
            powerLoadMap.set(pId, (powerLoadMap.get(pId) || 0) + loadPower);
            portLoadMap.set(dId, (portLoadMap.get(dId) || 0) + loadPixels);
        }
    }
    
    let totalPowerCables = powerLoadMap.size;
    let totalPortCables = portLoadMap.size;
    let peakPowerLoadActual = Math.max(...powerLoadMap.values(), 0);
    let peakPortLoadActual = Math.max(...portLoadMap.values(), 0);
    
    lastMatrix = matrix.map((row, r) => row.map((cell, c) => ({
        ...cell,
        controllerId: controllerIds[r][c],
        controllerLabel: `M${controllerIds[r][c]}`,
        powerLabel: powerLabels[r][c],
        portLabel: portLabels[r][c]
    })));

    const countCableSegments = (displayMatrix, labelField, idPrefix, includeController = false) => {
        const groups = {};
        for (let r = 0; r < displayMatrix.length; r++) {
            for (let c = 0; c < displayMatrix[0].length; c++) {
                const cell = displayMatrix[r][c];
                const match = (cell[labelField] || '').match(new RegExp(`${idPrefix}(\\d+)-(\\d+)`));
                if (!match) continue;
                const groupId = includeController ? `M${cell.controllerId || 1}-${idPrefix}${match[1]}` : `${idPrefix}${match[1]}`;
                if (!groups[groupId]) groups[groupId] = [];
                groups[groupId].push({ seq: parseInt(match[2], 10), r, c });
            }
        }

        let shortCount = 0;
        let jumperCount = 0;
        Object.values(groups).forEach(points => {
            points.sort((a, b) => a.seq - b.seq);
            for (let i = 1; i < points.length; i++) {
                const previous = points[i - 1];
                const current = points[i];
                const isJumper = direction === 'horizontal'
                    ? previous.r !== current.r
                    : previous.c !== current.c;
                if (isJumper) jumperCount++;
                else shortCount++;
            }
        });
        return { shortCount, jumperCount };
    };

    const powerSegments = countCableSegments(lastMatrix, 'powerLabel', 'P');
    const portSegments = countCableSegments(lastMatrix, 'portLabel', 'D', true);
    
    let totalResW = useCols * w;
    let totalResH = useRows * h + (hasHalfRow ? h/2 : 0);
   
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card stat-pair"><div class="stat-item"><div class="stat-label">Total Resolution</div><div class="stat-value">${totalResW}x${Math.floor(totalResH)}</div></div><div class="stat-item"><div class="stat-label">Screen Size</div><div class="stat-value">${useCols} x ${useRows + (hasHalfRow ? 0.5 : 0)}</div></div></div>
        <div class="stat-card stat-pair"><div class="stat-item"><div class="stat-label">Master Canvas</div><div class="stat-value">${portPlan.canvas.key} <span style="font-size:0.7em;color:#9aa6b5">${portPlan.canvas.width}x${portPlan.canvas.height}</span></div></div><div class="stat-item"><div class="stat-label">Processors</div><div class="stat-value" style="color:#fde68a;">${portPlan.controllerSummaries.length}</div></div></div>
        <div class="stat-card stat-pair"><div class="stat-item"><div class="stat-label">Main Power</div><div class="stat-value" style="color:#ff7e6e;">${totalPowerCables}</div></div><div class="stat-item"><div class="stat-label">Main Data</div><div class="stat-value" style="color:#6bc8ff;">${totalPortCables}</div></div></div>
        <div class="stat-card stat-pair"><div class="stat-item"><div class="stat-label">Short Power</div><div class="stat-value" style="color:#ffb4a8;">${powerSegments.shortCount}</div></div><div class="stat-item"><div class="stat-label">Short Data</div><div class="stat-value" style="color:#9ddcff;">${portSegments.shortCount}</div></div></div>
        <div class="stat-card stat-pair"><div class="stat-item"><div class="stat-label">Power Jumpers</div><div class="stat-value" style="color:#ff7e6e;">${powerSegments.jumperCount}</div></div><div class="stat-item"><div class="stat-label">Data Jumpers</div><div class="stat-value" style="color:#46b7ff;">${portSegments.jumperCount}</div></div></div>
    `;

    document.getElementById('maxPixelsSpan').innerText = maxPixels.toLocaleString();
    document.getElementById('maxPowerSpan').innerText = maxPower;
    document.getElementById('unitPowerSpan').innerText = unitPower;
    _lastControllerPlan = portPlan;
    renderDynamicVisual(lastMatrix);
    setTimeout(drawCablingLines, 100);
    renderPowerMapping(lastMatrix);
    renderPowerInfoStrip();
    renderProcessorCanvases();
    setTimeout(() => { wrapProcessorA4Pages(); decorateA4ReportPages(); }, 50);
    setTimeout(fitA4Pages, 200);
    setTimeout(notifyParentMappingReport, 260);
}

function renderDynamicVisualLegacyUnused(matrix) {
    if (!matrix.length) return;
    let rows = matrix.length, cols = matrix[0].length;
    let w = currentProductObj.pixelW, h = currentProductObj.pixelH;
    let ratio = h / w;
    let baseW = 96;
    let fullHeight = Math.min(140, Math.max(60, baseW * ratio));
    let halfHeight = fullHeight / 2;

    // 收集 ?有主 ?ID，为每个主控分配固定色相 (黄金 ?137.5° 均匀分布)
    let controllerIds = new Set();
    for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
            controllerIds.add(matrix[r][c].controllerId || 1);
    let sortedCids = [...controllerIds].sort((a, b) => a - b);
    let cidHueMap = {};
    // 固定色相：红绿蓝黄青紫橙棕，主控之间一眼区分
    const FIXED_HUES = [0, 120, 240, 60, 180, 300, 30, 270, 15, 160, 200, 340];
    sortedCids.forEach((cid, i) => {
        cidHueMap[cid] = FIXED_HUES[i % FIXED_HUES.length];
    });

    // 收集每个主控下的网口号，用于网口级别颜色区分
    let cidPortsMap = {};
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let mod = matrix[r][c];
            let cid = mod.controllerId || 1;
            let portMatch = mod.portLabel.match(/D(\d+)/);
            if (portMatch) {
                if (!cidPortsMap[cid]) cidPortsMap[cid] = new Set();
                cidPortsMap[cid].add(parseInt(portMatch[1]));
            }
        }
    }
    // Build port order for each controller.
    let cidPortOrder = {};
    for (let cid in cidPortsMap) {
        cidPortOrder[cid] = [...cidPortsMap[cid]].sort((a, b) => a - b);
    }

    let html = `<div class="matrix-visual" style="grid-template-columns: repeat(${cols}, ${baseW}px);">`;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let mod = matrix[r][c];
            let height = mod.type === "Half" ? halfHeight : fullHeight;
            let cid = mod.controllerId || 1;
            let controllerHue = cidHueMap[cid];
            let portMatch = mod.portLabel.match(/D(\d+)/);
            let portNum = portMatch ? parseInt(portMatch[1]) : 1;

            // 每个主控 2 种柔和高级色，相邻网口交替
            let portIdx = (cidPortOrder[cid] || [portNum]).indexOf(portNum);
            const DUO = [
                { l: 60, s: 46 },
                { l: 70, s: 42 },
            ];
            const c = DUO[portIdx % 2];
            let portFill = `hsl(${controllerHue}, ${c.s}%, ${c.l}%)`;
            let controllerBorder = `hsl(${controllerHue}, 80%, 52%)`;

            // Cabinet fill uses the port color only; no repeated top color strip.
            html += `<div class="cab-module" data-row="${r}" data-col="${c}" style="height:${height}px; border-color:rgba(31,41,55,0.18); background:${portFill};">
                        <div class="controller-text">${mod.controllerLabel || ''}</div>
                        <div class="power-text">${mod.powerLabel}</div>
                        <div class="port-text">${mod.portLabel}</div>
                    </div>`;
        }
    }
    html += `</div>`;
    document.getElementById('cabVisual').innerHTML = html;
}

function drawCablingLines() {
    let container = document.querySelector('#cabVisual .matrix-visual');
    if (!container || !lastMatrix) return;
    if (!container.offsetWidth || !container.offsetHeight) return;
    let svg = document.getElementById('cablingSvg');
    if (!svg) {
        svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.id = 'cablingSvg';
        svg.style.position = 'absolute';
        svg.style.top = '0';
        svg.style.left = '0';
        svg.style.width = '100%';
        svg.style.height = '100%';
        svg.style.pointerEvents = 'none';
        svg.style.zIndex = '3';
        container.style.position = 'relative';
        container.appendChild(svg);
    }
    svg.innerHTML = '';
    const svgRect = svg.getBoundingClientRect();
    svg.setAttribute('viewBox', `0 0 ${Math.max(1, svgRect.width)} ${Math.max(1, svgRect.height)}`);
    svg.setAttribute('preserveAspectRatio', 'none');

    let direction = document.getElementById('routeDirectionSelect').value;
    let powerGroups = {}, portGroups = {};

    for (let r = 0; r < lastMatrix.length; r++) {
        for (let c = 0; c < lastMatrix[0].length; c++) {
            let cell = lastMatrix[r][c];
            let el = container.querySelector(`[data-row="${r}"][data-col="${c}"]`);
            if (!el) continue;
            const elementRect = el.getBoundingClientRect();
            const left = elementRect.left - svgRect.left;
            const top = elementRect.top - svgRect.top;
            let cx = left + elementRect.width / 2;
            let cy = top + elementRect.height / 2;
            const box = {
                left,
                right: left + elementRect.width,
                top,
                bottom: top + elementRect.height,
                width: elementRect.width,
                height: elementRect.height
            };
            const laneX = elementRect.width * 0.12;
            const laneY = elementRect.height * 0.12;
            
            // 竖向：电源左/网线右，同高；横向：电源上/网线下，同X
            const isVert = direction === 'vertical';
            let pMatch = cell.powerLabel.match(/P(\d+)-(\d+)/);
            if (pMatch) {
                let id = pMatch[1], seq = parseInt(pMatch[2]);
                if (!powerGroups[id]) powerGroups[id] = [];
                powerGroups[id].push({ seq, x: isVert ? cx - laneX : cx, y: isVert ? cy : cy - laneY, r: r, c: c, box });
            }
            let dMatch = cell.portLabel.match(/D(\d+)-(\d+)/);
            if (dMatch) {
                let id = `M${cell.controllerId || 1}-D${dMatch[1]}`, seq = parseInt(dMatch[2]);
                if (!portGroups[id]) portGroups[id] = [];
                portGroups[id].push({ seq, x: isVert ? cx + laneX : cx, y: isVert ? cy : cy + laneY, r: r, c: c, box });
            }
        }
    }
    
    const getTopologyPath = (p1, p2, laneOffset = 0) => {
        const verticalMainInset = 0.28;
        const horizontalMainInset = 0.18;
        const sideInset = 0.18;
        const isVert = direction === 'vertical';
        const mid = (a, b) => (a + b) / 2;

        if (isVert) {
            if (p1.c === p2.c && p1.r !== p2.r) {
                const goingDown = p2.r > p1.r;
                const startY = goingDown ? p1.y + p1.box.height * verticalMainInset : p1.y - p1.box.height * verticalMainInset;
                const endY = goingDown ? p2.y - p2.box.height * verticalMainInset : p2.y + p2.box.height * verticalMainInset;
                return `M ${p1.x} ${startY} L ${p2.x} ${endY}`;
            }
            if (p1.c !== p2.c) {
                const goingRight = p2.c > p1.c;
                const startX = goingRight ? p1.box.right - p1.box.width * sideInset : p1.box.left + p1.box.width * sideInset;
                const endX = goingRight ? p2.box.left + p2.box.width * sideInset : p2.box.right - p2.box.width * sideInset;
                const seamX = goingRight ? mid(p1.box.right, p2.box.left) : mid(p1.box.left, p2.box.right);
                const startY = p1.y + laneOffset;
                const endY = p2.y + laneOffset;
                if (p1.r === p2.r) {
                    return `M ${startX} ${startY} L ${seamX} ${startY} L ${endX} ${startY}`;
                }
                return `M ${startX} ${startY} L ${seamX} ${startY} L ${seamX} ${endY} L ${endX} ${endY}`;
            }
        } else {
            if (p1.r === p2.r && p1.c !== p2.c) {
                const goingRight = p2.c > p1.c;
                const startX = goingRight ? p1.x + p1.box.width * horizontalMainInset : p1.x - p1.box.width * horizontalMainInset;
                const endX = goingRight ? p2.x - p2.box.width * horizontalMainInset : p2.x + p2.box.width * horizontalMainInset;
                return `M ${startX} ${p1.y + laneOffset} L ${endX} ${p2.y + laneOffset}`;
            }
            if (p1.r !== p2.r) {
                const goingDown = p2.r > p1.r;
                const startY = goingDown ? p1.box.bottom - p1.box.height * sideInset : p1.box.top + p1.box.height * sideInset;
                const endY = goingDown ? p2.box.top + p2.box.height * sideInset : p2.box.bottom - p2.box.height * sideInset;
                const seamY = goingDown ? mid(p1.box.bottom, p2.box.top) : mid(p1.box.top, p2.box.bottom);
                const startX = p1.x + laneOffset;
                const endX = p2.x + laneOffset;
                if (p1.c === p2.c) {
                    return `M ${startX} ${startY} L ${startX} ${seamY} L ${startX} ${endY}`;
                }
                return `M ${startX} ${startY} L ${startX} ${seamY} L ${endX} ${seamY} L ${endX} ${endY}`;
            }
        }
        return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
    };

    const drawGroup = (groups, color, laneOffset) => {
        for (let id in groups) {
            let pts = groups[id].sort((a,b) => a.seq - b.seq);
            if (pts.length <= 1) continue;
            for (let i = 1; i < pts.length; i++) {
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", getTopologyPath(pts[i - 1], pts[i], laneOffset));
                path.setAttribute("stroke", color);
                path.setAttribute("stroke-width", document.body.classList.contains('embedded-report') ? "1.15" : "2.2");
                path.setAttribute("fill", "none");
                path.setAttribute("stroke-linecap", "round"); path.setAttribute("stroke-linejoin", "round");
                path.setAttribute("opacity", "0.98");
                svg.appendChild(path);
            }
        }
    };
    drawGroup(powerGroups, "#e8382c", 0);
    drawGroup(portGroups, "#007ee8", 0);
}

function renderProcessorCanvasesLegacyUnused() {
    const container = document.getElementById('processorCanvases');
    if (!container || !_lastControllerPlan || !lastMatrix) {
        if (container) container.innerHTML = '';
        return;
    }

    const unitW = currentProductObj.pixelW || 1;
    const canvasW = canvas.width;
    const canvasH = canvas.height;
    const maxCols = plan.maxCols;
    const maxRows = plan.maxRows;

    // 色相
    const sortedCids = [...new Set(plan.controllerSummaries.map(s => s.id))].sort((a, b) => a - b);
    const cidHueMap = {};
    sortedCids.forEach((cid, i) => { cidHueMap[cid] = Math.round((i * 137.5) % 360); });

    const rawPlan = plan._rawPlan;
    const controllers = rawPlan ? rawPlan.controllers : [];
    const orientation = rawPlan ? rawPlan.orientation : plan.orientation;

    // 容器宽度
    const containerEl = document.querySelector('.cabling-canvas');
    const containerWidth = containerEl ? containerEl.clientWidth - 40 : 700;
    const maxStageW = Math.max(500, containerWidth);
    const padding = 20;

    let html = '';

    controllers.forEach((ctrl) => {
        const cid = ctrl.id;
        const hue = cidHueMap[cid] || 0;
        const pieceCount = ctrl.pieces.length;

        // ---- 计算画布网格 ----
        const gridCols = maxCols;
        const gridRows = maxRows;
        const cellSize = Math.max(14, Math.min(32, Math.floor((maxStageW - padding * 2) / gridCols)));
        const stageW = gridCols * cellSize + 4;
        const stageH = gridRows * cellSize + 4;

        // 建立 ? ?gridRows×gridCols 的矩阵，记录每个槽位对应 ?  屏体
        let grid = Array.from({ length: gridRows }, () => Array.from({ length: gridCols }, () => null));

        // 遍历 controller 的所 ?piece，将屏体 ?  画布网格
        ctrl.pieces.forEach((p, pieceIdx) => {
            // 计算 piece 在画布中的起始位 ?(以 ?体为单位)
            let canvasCol0 = 0, canvasRow0 = 0;
            if (orientation === 'tiled') {
                const stripsPerRow = Math.floor(maxCols / cols);
                const rowInCanvas = Math.floor(pieceIdx / stripsPerRow);
                const colInCanvas = pieceIdx % stripsPerRow;
                canvasCol0 = colInCanvas * cols;
                // 计算前面行的高度
                for (let pr = 0; pr < rowInCanvas; pr++) {
                    const prevPieceIdx = pr * stripsPerRow;
                    if (prevPieceIdx < ctrl.pieces.length) {
                        canvasRow0 += ctrl.pieces[prevPieceIdx].rows;
                    }
                }
            }
            // 其他策略：piece  ?(0,0)  ? ?
            for (let rr = 0; rr < p.rows; rr++) {
                for (let cc = 0; cc < p.cols; cc++) {
                    const gr = canvasRow0 + rr;
                    const gc = canvasCol0 + cc;
                    if (gr < gridRows && gc < gridCols) {
                        grid[gr][gc] = {
                            screenR: p.r + rr,
                            screenC: p.c + cc,
                            pieceIdx
                        };
                    }
                }
            }
        });

        let filledCells = 0;
        for (let gr = 0; gr < gridRows; gr++)
            for (let gc = 0; gc < gridCols; gc++)
                if (grid[gr][gc]) filledCells++;
        const totalCells = gridRows * gridCols;
        const utilPct = totalCells > 0 ? ((filledCells / totalCells) * 100).toFixed(1) : '0';
        const orientLabel = orientation === 'tiled' ? '条带拼贴' : orientation === 'vertical' ? '垂直分割' : '水平分割';

        html += `<div class="canvas-card">`;
        html += `<div class="canvas-card-header">`;
        html += `<span class="canvas-card-title">🎛 ?主控 M${cid}  ?${canvas.key} ${canvasW}×${canvasH}</span>`;
        html += `<span class="canvas-card-meta">${orientLabel} · ${pieceCount} 区块 · ${filledCells}/${totalCells} 槽位 (${utilPct}%) · 网格 ${gridCols}×${gridRows}</span>`;
        html += `</div>`;

        // 画布网格
        html += `<div class="canvas-card-stage" style="width:${stageW}px;height:${stageH}px;">`;
        html += `<div style="display:grid;grid-template-columns:repeat(${gridCols},${cellSize}px);grid-template-rows:repeat(${gridRows},${cellSize}px);gap:1px;padding:2px;">`;

        for (let gr = 0; gr < gridRows; gr++) {
            for (let gc = 0; gc < gridCols; gc++) {
                const cell = grid[gr][gc];
                if (cell) {
                    html += `<div title="屏体 [${cell.screenR},${cell.screenC}]" style="width:${cellSize}px;height:${cellSize}px;background:hsl(${hue},60%,42%);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:${Math.max(6,cellSize*0.38)}px;color:#fff;font-family:'JetBrains Mono',monospace;font-weight:600;">${cell.screenR},${cell.screenC}</div>`;
                } else {
                    // 空槽位：暗色背景
                    html += `<div style="width:${cellSize}px;height:${cellSize}px;background:#f8fafc;border-radius:2px;"></div>`;
                }
            }
        }
        html += `</div></div>`;

        // 图例
        html += `<div class="canvas-card-legend">`;
        html += `<span><span class="swatch" style="background:hsl(${hue},60%,42%);"></span>主控 M${cid} 画布区域</span>`;
        html += `<span><span class="swatch" style="background:#f8fafc;border:1px solid #d8e0eb;"></span> ?  用槽 ?/span>`;
        ctrl.pieces.forEach((p, i) => {
            html += `<span>区块${i + 1}: 屏体 ?{p.r}-${p.r + p.rows - 1}  ?{p.c}-${p.c + p.cols - 1} (${p.cols}×${p.rows})</span>`;
        });
        html += `</div></div>`;
    });

    container.innerHTML = html;
}

function buildControllerCanvasPlan(matrix, canvas) {
    const rows = matrix.length;
    const cols = matrix[0].length;
    const unitWidth = currentProductObj.pixelW || 1;
    const unitHeight = currentProductObj.pixelH || 1;
    const totalWidth = cols * unitWidth;
    const totalHeight = sumRowPixelHeight(matrix, 0, rows);
    const canvasAspect = canvas.width / canvas.height;
    const screenAspect = totalWidth / Math.max(1, totalHeight);
    const maxCols = Math.max(1, Math.floor(canvas.width / unitWidth));
    const maxRows = getRowsThatFitCanvas(matrix, 0, rows, canvas.height);
    const minByArea = Math.max(1, Math.ceil((totalWidth * totalHeight) / (canvas.width * canvas.height)));
    const minByWidth = Math.max(1, Math.ceil(totalWidth / canvas.width));
    const minByHeight = Math.max(1, Math.ceil(totalHeight / canvas.height));
    const minControllers = Math.max(minByArea, minByWidth, minByHeight);
    const maxControllers = Math.max(minControllers, rows * cols);

    const rowPrefix = [0];
    for (let r = 0; r < rows; r++) {
        rowPrefix.push(rowPrefix[r] + (matrix[r][0]?.pixelH || unitHeight));
    }
    const rowHeight = (startRow, rowCount) => rowPrefix[startRow + rowCount] - rowPrefix[startRow];

    const buildStripTilingPlan = () => {
        if (cols > maxCols) return null;
        const stripsPerCanvasRow = Math.floor(maxCols / cols);
        if (stripsPerCanvasRow <= 0) return null;

        let minStrips = 1;
        let accumulatedHeight = 0;
        for (let rowIndex = 0; rowIndex < rows; rowIndex++) {
            const rowPixelHeight = matrix[rowIndex]?.[0]?.pixelH || unitHeight;
            if (accumulatedHeight > 0 && accumulatedHeight + rowPixelHeight > canvas.height) {
                minStrips++;
                accumulatedHeight = 0;
            }
            accumulatedHeight += rowPixelHeight;
        }

        let best = null;
        for (let stripCount = minStrips; stripCount <= rows; stripCount++) {
            const strips = splitRowsIntoStrips(matrix, stripCount, canvas.height);
            if (!strips) continue;
            const canvasRowsNeeded = [];
            for (let index = 0; index < strips.length; index += stripsPerCanvasRow) {
                const rowStrips = strips.slice(index, index + stripsPerCanvasRow);
                const rowWidth = rowStrips.length * cols * unitWidth;
                const rowHeightMax = Math.max(...rowStrips.map(strip => strip.height));
                canvasRowsNeeded.push({ rowWidth, rowHeightMax });
            }
            if (canvasRowsNeeded.some(row => row.rowWidth > canvas.width || row.rowHeightMax > canvas.height)) continue;
            const controllerCount = Math.ceil(strips.length / stripsPerCanvasRow);
            if (!best || controllerCount < best.controllerCount || (controllerCount === best.controllerCount && stripCount < best.stripCount)) {
                best = { strips, stripCount, controllerCount };
            }
            if (controllerCount === 1 && stripCount === minStrips) break;
        }
        if (!best) return null;

        const controllers = [];
        let controllerId = 1;
        let stripIndex = 0;
        while (stripIndex < best.strips.length) {
            const pieces = [];
            let canvasCol = 0;
            for (let slot = 0; slot < stripsPerCanvasRow && stripIndex < best.strips.length; slot++, stripIndex++) {
                const strip = best.strips[stripIndex];
                pieces.push({
                    r: strip.r,
                    c: 0,
                    rows: strip.rows,
                    cols,
                    canvasR: 0,
                    canvasC: canvasCol,
                    controllerId
                });
                canvasCol += cols;
            }
            controllers.push({ id: controllerId, pieces });
            controllerId++;
        }
        const utilizations = controllers.map(controller => {
            const usedPixels = controller.pieces.reduce((sum, piece) => {
                return sum + piece.cols * unitWidth * rowHeight(piece.r, piece.rows);
            }, 0);
            return usedPixels / Math.max(1, canvas.width * canvas.height);
        });
        return {
            controllers,
            maxCols,
            maxRows,
            canvasPixels: canvas.width * canvas.height,
            orientation: 'tiled',
            utilization: utilizations.reduce((sum, item) => sum + item, 0) / Math.max(1, utilizations.length),
            minUtilization: Math.min(...utilizations),
            rowGroups: [],
            colGroups: []
        };
    };

    const buildColumnStackPlan = () => {
        if (totalHeight > canvas.height) return null;
        const maxChunksPerCanvas = Math.floor(canvas.height / Math.max(1, totalHeight));
        if (maxChunksPerCanvas <= 1) return null;

        let best = null;
        for (let chunkCount = minByWidth; chunkCount <= cols; chunkCount++) {
            const base = Math.floor(cols / chunkCount);
            const extra = cols % chunkCount;
            const chunks = [];
            let startCol = 0;
            let valid = true;
            for (let chunkIndex = 0; chunkIndex < chunkCount; chunkIndex++) {
                const chunkCols = base + (chunkIndex < extra ? 1 : 0);
                if (chunkCols < 1 || chunkCols > maxCols) {
                    valid = false;
                    break;
                }
                chunks.push({ c: startCol, cols: chunkCols });
                startCol += chunkCols;
            }
            if (!valid) continue;

            const controllerCount = Math.ceil(chunks.length / maxChunksPerCanvas);
            if (!best || controllerCount < best.controllerCount || (controllerCount === best.controllerCount && chunkCount < best.chunkCount)) {
                best = { chunks, chunkCount, controllerCount };
            }
            if (controllerCount === 1) break;
        }
        if (!best) return null;

        const controllers = [];
        let controllerId = 1;
        let chunkIndex = 0;
        while (chunkIndex < best.chunks.length) {
            const pieces = [];
            let canvasRow = 0;
            for (let slot = 0; slot < maxChunksPerCanvas && chunkIndex < best.chunks.length; slot++, chunkIndex++) {
                const chunk = best.chunks[chunkIndex];
                pieces.push({
                    r: 0,
                    c: chunk.c,
                    rows,
                    cols: chunk.cols,
                    canvasR: canvasRow,
                    canvasC: 0,
                    controllerId
                });
                canvasRow += rows;
            }
            controllers.push({ id: controllerId, pieces });
            controllerId++;
        }

        const utilizations = controllers.map(controller => {
            const usedPixels = controller.pieces.reduce((sum, piece) => {
                return sum + piece.cols * unitWidth * rowHeight(piece.r, piece.rows);
            }, 0);
            return usedPixels / Math.max(1, canvas.width * canvas.height);
        });
        return {
            controllers,
            maxCols,
            maxRows,
            canvasPixels: canvas.width * canvas.height,
            orientation: 'stacked',
            utilization: utilizations.reduce((sum, item) => sum + item, 0) / Math.max(1, utilizations.length),
            minUtilization: Math.min(...utilizations),
            rowGroups: [],
            colGroups: []
        };
    };

    const partitionColumns = (groupCount) => {
        if (groupCount < 1 || groupCount > cols) return null;
        const base = Math.floor(cols / groupCount);
        const extra = cols % groupCount;
        let groups = [];
        let c = 0;
        for (let i = 0; i < groupCount; i++) {
            const count = base + (i < extra ? 1 : 0);
            if (count < 1 || count > maxCols) return null;
            groups.push({ c, cols: count, width: count * unitWidth });
            c += count;
        }
        return groups;
    };

    const partitionRows = (groupCount) => {
        if (groupCount < 1 || groupCount > rows) return null;
        const target = totalHeight / groupCount;
        const dp = Array.from({ length: groupCount + 1 }, () => Array(rows + 1).fill(null));
        dp[0][0] = { score: 0, prev: -1 };
        for (let g = 1; g <= groupCount; g++) {
            for (let end = g; end <= rows; end++) {
                for (let start = g - 1; start < end; start++) {
                    if (!dp[g - 1][start]) continue;
                    const h = rowHeight(start, end - start);
                    if (h > canvas.height) continue;
                    const score = dp[g - 1][start].score + Math.pow(h - target, 2);
                    if (!dp[g][end] || score < dp[g][end].score) {
                        dp[g][end] = { score, prev: start };
                    }
                }
            }
        }
        if (!dp[groupCount][rows]) return null;
        const groups = [];
        let end = rows;
        for (let g = groupCount; g >= 1; g--) {
            const prev = dp[g][end].prev;
            const count = end - prev;
            groups.unshift({ r: prev, rows: count, height: rowHeight(prev, count) });
            end = prev;
        }
        return groups;
    };

    const evaluate = (rowGroups, colGroups) => {
        const areas = [];
        let aspectPenalty = 0;
        for (let rg of rowGroups) {
            for (let cg of colGroups) {
                const pieceWidth = cg.width;
                const pieceHeight = rg.height;
                const area = pieceWidth * pieceHeight;
                areas.push(area);
                const pieceAspect = pieceWidth / Math.max(1, pieceHeight);
                aspectPenalty += Math.abs(Math.log(Math.max(1e-6, pieceAspect / canvasAspect)));
            }
        }
        const avgArea = areas.reduce((sum, item) => sum + item, 0) / Math.max(1, areas.length);
        const spread = areas.length > 1 ? (Math.max(...areas) - Math.min(...areas)) / Math.max(1, avgArea) : 0;
        const layoutAspect = colGroups.length / rowGroups.length;
        const layoutPenalty = Math.abs(Math.log(Math.max(1e-6, layoutAspect / Math.max(1e-6, screenAspect))));
        const directionPenalty = screenAspect >= 1
            ? Math.max(0, rowGroups.length - colGroups.length)
            : Math.max(0, colGroups.length - rowGroups.length);
        return aspectPenalty * 18 + spread * 12 + layoutPenalty * 10 + directionPenalty * 2;
    };

    const buildControllers = (rowGroups, colGroups) => {
        let controllers = [];
        let id = 1;
        for (let rg of rowGroups) {
            for (let cg of colGroups) {
                controllers.push({
                    id,
                    pieces: [{ r: rg.r, c: cg.c, rows: rg.rows, cols: cg.cols, controllerId: id }]
                });
                id++;
            }
        }
        return controllers;
    };

    const stackedPlan = buildColumnStackPlan();
    if (stackedPlan) return stackedPlan;
    const tiledPlan = buildStripTilingPlan();
    if (tiledPlan) return tiledPlan;

    let selected = null;
    for (let controllerCount = minControllers; controllerCount <= maxControllers; controllerCount++) {
        let bestForCount = null;
        for (let rowGroupsCount = 1; rowGroupsCount <= controllerCount; rowGroupsCount++) {
            if (controllerCount % rowGroupsCount !== 0) continue;
            const colGroupsCount = controllerCount / rowGroupsCount;
            const rowGroups = partitionRows(rowGroupsCount);
            const colGroups = partitionColumns(colGroupsCount);
            if (!rowGroups || !colGroups) continue;
            const score = evaluate(rowGroups, colGroups);
            if (!bestForCount || score < bestForCount.score) {
                bestForCount = { rowGroups, colGroups, score };
            }
        }
        if (bestForCount) {
            selected = {
                controllerCount,
                rowGroups: bestForCount.rowGroups,
                colGroups: bestForCount.colGroups,
                score: bestForCount.score
            };
            break;
        }
    }

    if (!selected) {
        const rowGroups = partitionRows(Math.min(rows, minControllers)) || Array.from({ length: rows }, (_, r) => ({
            r, rows: 1, height: rowHeight(r, 1)
        }));
        const colGroups = partitionColumns(Math.min(cols, minControllers)) || Array.from({ length: cols }, (_, c) => ({
            c, cols: 1, width: unitWidth
        }));
        selected = { controllerCount: rowGroups.length * colGroups.length, rowGroups, colGroups, score: 0 };
    }

    const controllers = buildControllers(selected.rowGroups, selected.colGroups);
    return {
        controllers,
        maxCols,
        maxRows,
        canvasPixels: canvas.width * canvas.height,
        orientation: selected.colGroups.length > selected.rowGroups.length ? 'horizontal' : 'vertical',
        utilization: 1,
        minUtilization: 1,
        rowGroups: selected.rowGroups,
        colGroups: selected.colGroups
    };
}

function getMatrixResolution(matrix) {
    if (!matrix?.length) return { width: 0, height: 0 };
    const width = Math.max(...matrix.map(row => row.reduce((sum, cell) => sum + (cell.pixelW || currentProductObj.pixelW || 0), 0)));
    const height = matrix.reduce((sum, row) => sum + Math.max(...row.map(cell => cell.pixelH || currentProductObj.pixelH || 0)), 0);
    return { width, height };
}

function adaptiveMatrixLabelPx(matrix, label, cellWidth, cellHeight, maxSize = 8) {
    const resolution = getMatrixResolution(matrix);
    const rows = matrix.length;
    const cols = matrix[0]?.length || 1;
    const density = Math.max(1, resolution.width / 1920, resolution.height / 1080, cols / 12, rows / 8);
    const byWidth = (cellWidth * 0.78) / Math.max(1, String(label || "").length * 0.62);
    const byHeight = cellHeight * 0.18;
    return Math.max(0.8, Math.min(maxSize / Math.sqrt(density), byWidth, byHeight));
}

function matrixVisualCellWidth(cols) {
    if (!document.body.classList.contains('embedded-report')) return 96;
    // The iframe can be rendered while its parent appendix is still hidden,
    // so layout measurements may be zero here. Embedded A4 pages are fixed at
    // 794px with 36px horizontal padding on each side.
    const contentWidth = 722;
    const gap = 3;
    const padding = 20;
    return Math.max(12, Math.floor((contentWidth - padding - gap * Math.max(0, cols - 1)) / Math.max(1, cols)));
}

function matrixVisualCellHeight(cellWidth, ratio) {
    if (document.body.classList.contains('embedded-report')) {
        return Math.max(12, Math.min(140, Math.round(cellWidth * ratio)));
    }
    return Math.min(140, Math.max(60, cellWidth * ratio));
}

function renderDynamicVisual(matrix) {
    if (!matrix.length) return;
    const rows = matrix.length;
    const cols = matrix[0].length;
    const w = currentProductObj.pixelW;
    const h = currentProductObj.pixelH;
    const ratio = h / w;
    const baseW = matrixVisualCellWidth(cols);
    const fullHeight = matrixVisualCellHeight(baseW, ratio);
    const halfHeight = fullHeight / 2;

    const controllerIds = [...new Set(matrix.flat().map(cell => cell.controllerId || 1))].sort((a, b) => a - b);
    const controllerIndexMap = new Map(controllerIds.map((cid, index) => [cid, index + 1]));
    const portIndexMap = new Map();
    for (let cid of controllerIds) {
        const ports = [...new Set(matrix.flat().filter(cell => (cell.controllerId || 1) === cid).map(cell => parseInt(cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10)))].sort((a, b) => a - b);
        portIndexMap.set(cid, new Map(ports.map((port, index) => [port, index])));
    }

    let html = `<div class="matrix-visual" style="grid-template-columns: repeat(${cols}, ${baseW}px);">`;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const mod = matrix[r][c];
            const height = mod.type === "Half" ? halfHeight : fullHeight;
            const cid = mod.controllerId || 1;
            const controllerToneIndex = controllerIndexMap.get(cid) || 1;
            const portNum = parseInt(mod.portLabel.match(/D(\d+)/)?.[1] || '1', 10);
            const portIdx = portIndexMap.get(cid)?.get(portNum) ?? 0;
            const portCount = portIndexMap.get(cid)?.size || 1;
            const portFill = portFillColor(controllerToneIndex, portIdx, r, c, document.getElementById('routeDirectionSelect')?.value, 'topology');
            const powerFont = adaptiveMatrixLabelPx(matrix, mod.powerLabel, baseW, height, 8);
            const portFont = adaptiveMatrixLabelPx(matrix, mod.portLabel, baseW, height, 8);
            html += `<div class="cab-module" data-row="${r}" data-col="${c}" style="width:${baseW}px;height:${height}px; background:${portFill};">
                        <div class="power-text" style="font-size:${powerFont.toFixed(2)}px">${mod.powerLabel}</div>
                        <div style="height:${Math.max(1, height * 0.08).toFixed(1)}px;"></div>
                        <div class="port-text" style="font-size:${portFont.toFixed(2)}px">${mod.portLabel}</div>
                    </div>`;
        }
    }
    html += `</div>`;
    document.getElementById('cabVisual').innerHTML = html;
}

function renderPowerMapping(matrix) {
    const powerVisual = document.getElementById('powerVisual');
    if (!powerVisual || !matrix?.length) return;

    const rows = matrix.length;
    const cols = matrix[0].length;
    const unitWidth = currentProductObj.pixelW || 1;
    const ratio = (currentProductObj.pixelH || unitWidth) / unitWidth;
    const baseW = matrixVisualCellWidth(cols);
    const fullHeight = matrixVisualCellHeight(baseW, ratio);
    const halfHeight = fullHeight / 2;

    let html = `<div class="matrix-visual power-matrix-visual" style="grid-template-columns: repeat(${cols}, ${baseW}px);">`;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const cell = matrix[r][c];
            const height = cell.type === "Half" ? halfHeight : fullHeight;
            const tone = powerMappingTone(cell.powerLabel);
            const fontSize = adaptiveMatrixLabelPx(matrix, cell.powerLabel, baseW, height, 9);
            html += `<div class="cab-module" data-power-row="${r}" data-power-col="${c}" style="width:${baseW}px;height:${height}px;background:${tone.fill};border:1.5px solid ${tone.border};box-shadow:none;">
                        <div class="power-text" style="font-size:${fontSize.toFixed(2)}px">${cell.powerLabel}</div>
                    </div>`;
        }
    }
    html += `</div>`;
    powerVisual.innerHTML = html;
    setTimeout(drawPowerMappingLines, 30);
}

function drawPowerMappingLines() {
    const container = document.querySelector('.power-matrix-visual');
    if (!container || !lastMatrix) return;
    let svg = document.getElementById('powerMappingSvg');
    if (!svg) {
        svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.id = 'powerMappingSvg';
        svg.style.position = 'absolute';
        svg.style.left = '0';
        svg.style.top = '0';
        svg.style.width = '100%';
        svg.style.height = '100%';
        svg.style.pointerEvents = 'none';
        svg.style.zIndex = '1';
        container.style.position = 'relative';
        container.appendChild(svg);
    }
    svg.innerHTML = '';
    const svgRect = svg.getBoundingClientRect();
    svg.setAttribute('viewBox', `0 0 ${Math.max(1, svgRect.width)} ${Math.max(1, svgRect.height)}`);
    svg.setAttribute('preserveAspectRatio', 'none');

    const direction = document.getElementById('routeDirectionSelect').value;
    const groups = {};
    for (let r = 0; r < lastMatrix.length; r++) {
        for (let c = 0; c < lastMatrix[0].length; c++) {
            const cell = lastMatrix[r][c];
            const element = container.querySelector(`[data-power-row="${r}"][data-power-col="${c}"]`);
            if (!element) continue;
            const elementRect = element.getBoundingClientRect();
            const left = elementRect.left - svgRect.left;
            const top = elementRect.top - svgRect.top;
            const match = cell.powerLabel.match(/P(\d+)-(\d+)/);
            if (!match) continue;
            const id = `P${match[1]}`;
            if (!groups[id]) groups[id] = [];
            groups[id].push({
                seq: parseInt(match[2], 10),
                x: left + elementRect.width / 2,
                y: top + elementRect.height / 2,
                r,
                c,
                box: {
                    left,
                    right: left + elementRect.width,
                    top,
                    bottom: top + elementRect.height,
                    width: elementRect.width,
                    height: elementRect.height
                }
            });
        }
    }

    let defs = svg.querySelector('defs');
    if (!defs) { defs = document.createElementNS("http://www.w3.org/2000/svg","defs"); svg.appendChild(defs); }
    const getPowerArrowMarker = (id, color) => {
        const markerId = `powerOnlyArrowMarker-${id.replace(/[^a-zA-Z0-9_-]/g, '')}`;
        let marker = document.getElementById(markerId);
        if (!marker) {
            marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
            marker.id = markerId;
            marker.setAttribute("viewBox", "0 0 10 10");
            marker.setAttribute("refX", "8.5");
            marker.setAttribute("refY", "5");
            marker.setAttribute("markerWidth", "3.2");
            marker.setAttribute("markerHeight", "3.2");
            marker.setAttribute("orient", "auto-start-reverse");
            const arrow = document.createElementNS("http://www.w3.org/2000/svg", "path");
            arrow.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
            arrow.setAttribute("fill", color);
            marker.appendChild(arrow);
            defs.appendChild(marker);
        }
        return markerId;
    };

    const powerArrowPath = (previous, current) => {
        const insideRatio = direction === 'horizontal' ? 0.18 : 0.28;
        if (previous.r !== current.r && previous.c === current.c) {
            const goingDown = current.r > previous.r;
            const startY = goingDown ? previous.y + previous.box.height * insideRatio : previous.y - previous.box.height * insideRatio;
            const endY = goingDown ? current.y - current.box.height * insideRatio : current.y + current.box.height * insideRatio;
            return `M ${previous.x} ${startY} L ${current.x} ${endY}`;
        }
        if (previous.c !== current.c && previous.r === current.r) {
            const goingRight = current.c > previous.c;
            const startX = goingRight ? previous.x + previous.box.width * insideRatio : previous.x - previous.box.width * insideRatio;
            const endX = goingRight ? current.x - current.box.width * insideRatio : current.x + current.box.width * insideRatio;
            return `M ${startX} ${previous.y} L ${endX} ${current.y}`;
        }
        const startX = current.c > previous.c ? previous.x + previous.box.width * insideRatio : current.c < previous.c ? previous.x - previous.box.width * insideRatio : previous.x;
        const startY = current.r > previous.r ? previous.y + previous.box.height * insideRatio : current.r < previous.r ? previous.y - previous.box.height * insideRatio : previous.y;
        const endX = current.c > previous.c ? current.x - current.box.width * insideRatio : current.c < previous.c ? current.x + current.box.width * insideRatio : current.x;
        const endY = current.r > previous.r ? current.y - current.box.height * insideRatio : current.r < previous.r ? current.y + current.box.height * insideRatio : current.y;
        const midX = (startX + endX) / 2;
        const midY = (startY + endY) / 2;
        return direction === 'vertical'
            ? `M ${startX} ${startY} L ${midX} ${startY} L ${midX} ${endY} L ${endX} ${endY}`
            : `M ${startX} ${startY} L ${startX} ${midY} L ${endX} ${midY} L ${endX} ${endY}`;
    };

    Object.entries(groups).forEach(([id, points]) => {
        const tone = powerMappingTone(id);
        const markerId = getPowerArrowMarker(id, tone.line);
        points.sort((a, b) => a.seq - b.seq);
        for (let i = 1; i < points.length; i++) {
            const previous = points[i - 1];
            const current = points[i];
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", powerArrowPath(previous, current));
            path.setAttribute("stroke", tone.line);
            path.setAttribute("stroke-width", document.body.classList.contains('embedded-report') ? "1.15" : "2");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-linecap", "round");
            path.setAttribute("stroke-linejoin", "round");
            path.setAttribute("marker-end", `url(#${markerId})`);
            path.setAttribute("opacity", "0.9");
            svg.appendChild(path);
        }
    });
}

function renderProcessorCanvasesCanvasLegacyUnused() {

    if (!container || !_lastControllerPlan || !lastMatrix) {
        if (container) container.innerHTML = '';
        return;
    }

    const plan = _lastControllerPlan;
