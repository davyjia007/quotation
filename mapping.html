    const maxStageW = Math.max(520, (stageContainer?.clientWidth || 900) - 40);
    const cellW = Math.max(18, Math.min(36, Math.floor(maxStageW / Math.max(1, cols))));
    const rowHeights = matrix.map(row => {
        const pixelH = row[0]?.pixelH || currentProductObj.pixelH || unitWidth;
        return Math.max(12, Math.round(cellW * (pixelH / unitWidth)));
    });
    const rowOffsets = [0];
    for (let i = 0; i < rowHeights.length; i++) rowOffsets.push(rowOffsets[i] + rowHeights[i]);
    const stageW = cols * cellW + 6;
    const stageH = rowOffsets[rows] + 6;
    const orderedControllers = [...(plan.controllers || plan._rawPlan?.controllers || [])].sort((a, b) => {
        const ap = a.pieces[0];
        const bp = b.pieces[0];
        return (ap.r - bp.r) || (ap.c - bp.c);
    });

    let html = '';
    orderedControllers.forEach((controller, displayIndex) => {
        const piece = controller.pieces[0];
        const toneIndex = displayIndex + 1;
        const tone = getControllerTone(toneIndex);
        const borderColor = controllerBorderColor(toneIndex);
        const controllerLabel = `Processor ${displayIndex + 1}`;
        const pieceLabel = ` ?${piece.r + 1}-${piece.r + piece.rows} ·  ?${piece.c + 1}-${piece.c + piece.cols}`;
        const occupied = new Set();
        for (let r = piece.r; r < piece.r + piece.rows; r++) {
            for (let c = piece.c; c < piece.c + piece.cols; c++) {
                occupied.add(`${r},${c}`);
            }
        }
        const ports = [...new Set(matrix.flat().filter(cell => (cell.controllerId || 1) === controller.id).map(cell => parseInt(cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10)))].sort((a, b) => a - b);
        const portIndex = new Map(ports.map((port, index) => [port, index]));
        const stageId = `processor-stage-${controller.id}`;
        let stageGrid = `<div class="canvas-card-stage" style="width:${stageW}px;height:${stageH}px;">`;
        stageGrid += `<div style="position:absolute;inset:3px;display:grid;grid-template-columns:repeat(${cols}, ${cellW}px);grid-template-rows:${rowHeights.map(height => `${height}px`).join(' ')};gap:1px;">`;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = matrix[r][c];
                const key = `${r},${c}`;
                if (occupied.has(key)) {
                    const portNum = parseInt(cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10);
                    const idx = portIndex.get(portNum) ?? 0;
                    const fill = portFillColor(toneIndex, idx, localRow, localCol, document.getElementById('routeDirectionSelect')?.value, 'processor');
                    const fontSize = Math.max(6, Math.min(11, Math.min(cellW, rowHeights[r]) * 0.34));
                    stageGrid += `<div style="width:${cellW}px;height:${rowHeights[r]}px;background:${fill};border:1px solid rgba(255,255,255,0.35);border-radius:2px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:${fontSize}px;font-family:'JetBrains Mono',monospace;font-weight:700;line-height:1.1;" title="屏体 [${r},${c}]">${r + 1},${c + 1}</div>`;
                } else {
                    stageGrid += `<div style="width:${cellW}px;height:${rowHeights[r]}px;background:#f8fafc;border:1px solid #d8e0eb;border-radius:2px;"></div>`;
                }
            }
        }
        stageGrid += `</div>`;

        const groups = {};
        for (let r = piece.r; r < piece.r + piece.rows; r++) {
            for (let c = piece.c; c < piece.c + piece.cols; c++) {
                const cell = matrix[r][c];
                const match = cell.portLabel.match(/D(\d+)-(\d+)/);
                if (!match) continue;
                const portNum = parseInt(match[1], 10);
                const seq = parseInt(match[2], 10);
                if (!groups[portNum]) groups[portNum] = [];
                groups[portNum].push({
                    seq,
                    x: (c * cellW) + cellW / 2 + 3,
                    y: rowOffsets[r] + rowHeights[r] / 2 + 3,
                    r,
                    c
                });
            }
        }

        let paths = '';
        const laneOffset = 0;
        // 网线纯色实线，不用箭头
        const processorArrowPath = (p1, p2) => {
            const mainInset = 0.28;
            const sideInset = 0.18;
            if (p1.localCol === p2.localCol && p1.localRow !== p2.localRow) {
                const goingDown = p2.localRow > p1.localRow;
                const startY = goingDown ? p1.y + p1.box.height * mainInset : p1.y - p1.box.height * mainInset;
                const endY   = goingDown ? p2.y - p2.box.height * mainInset : p2.y + p2.box.height * mainInset;
                return `M ${p1.x} ${startY} L ${p2.x} ${endY}`;
            }
            if (p1.localCol !== p2.localCol) {
                const goingRight = p2.localCol > p1.localCol;
                const startX = goingRight ? p1.box.right - p1.box.width * sideInset : p1.box.left + p1.box.width * sideInset;
                const endX   = goingRight ? p2.box.left + p2.box.width * sideInset : p2.box.right - p2.box.width * sideInset;
                if (p1.localRow === p2.localRow) {
                    return `M ${startX} ${p1.y} L ${endX} ${p2.y}`;
                }
                const gapCenterX = ((p1.box.right + p2.box.left) / 2) + laneOffset;
                return `M ${startX} ${p1.y} L ${gapCenterX} ${p1.y} L ${gapCenterX} ${p2.y} L ${endX} ${p2.y}`;
            }
            return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
        };
        Object.keys(groups).sort((first, second) => parseInt(first, 10) - parseInt(second, 10)).forEach(portNum => {
            const points = groups[portNum].sort((first, second) => first.sequence - second.sequence);
            if (points.length <= 1) return;
            for (let pointIndex = 1; pointIndex < points.length; pointIndex++) {
                const d = processorArrowPath(points[pointIndex - 1], points[pointIndex]);
                paths += `<path d="${d}" stroke="#1e9bff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"></path>`;
            }
        });

        html += `<div class="canvas-card">
            <div class="canvas-card-header">
                <span class="canvas-card-title">${controllerLabel}</span>
                <span class="canvas-card-meta">${pieceLabel} · ${piece.cols}×${piece.rows}</span>
            </div>
            ${stageGrid}<svg id="${stageId}-svg" style="position:absolute;inset:0;width:${stageW}px;height:${stageH}px;pointer-events:none;">${paths}</svg></div>
            <div class="canvas-card-legend">
                <span><span class="swatch" style="background:${borderColor};"></span>主控 ${displayIndex + 1}</span>
                <span><span class="swatch" style="background:#f8fafc;border:1px solid #d8e0eb;"></span> ?  用槽 ?/span>
                <span>网口 ?  ：同 ?主控内使用渐变色 ?/span>
            </div>
        </div>`;
    });

    container.innerHTML = html;
}

function formatProcessorScreenNumber(value) {
    if (!Number.isFinite(value)) return '0';
    if (Math.abs(value - Math.round(value)) < 0.001) return String(Math.round(value));
    return value.toFixed(2).replace(/\.?0+$/, '');
}

function getProcessorCanvasMeta(pieces, occupied, rowRatios, unitWidth) {
    const pieceLabel = pieces
        .map(piece => `Rows ${piece.r + 1}-${piece.r + piece.rows} - Cols ${piece.c + 1}-${piece.c + piece.cols}`)
        .join(' / ');
    const occupiedCells = [...occupied.values()];
    if (!occupiedCells.length) {
        return {
            pieceLabel,
            meta: ''
        };
    }
    const minOccupiedRow = Math.min(...occupiedCells.map(item => item.localRow));
    const maxOccupiedRow = Math.max(...occupiedCells.map(item => item.localRow));
    const minOccupiedCol = Math.min(...occupiedCells.map(item => item.localCol));
    const maxOccupiedCol = Math.max(...occupiedCells.map(item => item.localCol));
    const actualPixelW = occupiedCells.reduce((max, item) => Math.max(max, (item.localCol - minOccupiedCol + 1) * (item.cell.pixelW || currentProductObj.pixelW || unitWidth)), 0);
    const actualPixelH = rowRatios.slice(minOccupiedRow, maxOccupiedRow + 1).reduce((sum, ratio) => sum + ratio * unitWidth, 0);
    const fullPixelW = currentProductObj.pixelW || unitWidth || 1;
    const fullPixelH = currentProductObj.pixelH || unitWidth || 1;
    const actualScreenCols = actualPixelW / fullPixelW;
    const actualScreenRows = actualPixelH / fullPixelH;
    return {
        pieceLabel,
        actualPixelW,
        actualPixelH,
        actualScreenCols,
        actualScreenRows,
        meta: ''
    };
}

function renderProcessorCanvases() {
    const container = document.getElementById('processorCanvases');
    if (!container || !_lastControllerPlan || !lastMatrix) {
        if (container) container.innerHTML = '';
        return;
    }

    const plan = _lastControllerPlan;
    const canvas = plan.canvas;
    const matrix = lastMatrix;
    const unitWidth = currentProductObj.pixelW || 1;
    const stageContainer = document.querySelector('.cabling-canvas');
    const embeddedReport = document.body.classList.contains('embedded-report');
    const maxStageWidth = embeddedReport ? 680 : Math.max(520, (stageContainer?.clientWidth || 900) - 40);
    const maxCellWidth = embeddedReport ? 72 : 36;
    const gridGap = 1;
    const orderedControllers = [...(plan.controllers || plan._rawPlan?.controllers || [])].sort((first, second) => {
        const firstPiece = first.pieces[0];
        const secondPiece = second.pieces[0];
        return (firstPiece.r - secondPiece.r) || (firstPiece.c - secondPiece.c);
    });

    let html = '';
    orderedControllers.forEach((controller, displayIndex) => {
        const pieces = controller.pieces || [];
        if (!pieces.length) return;

        const minRow = Math.min(...pieces.map(piece => piece.r));
        const minCol = Math.min(...pieces.map(piece => piece.c));
        const maxRow = Math.max(...pieces.map(piece => piece.r + piece.rows));
        const maxCol = Math.max(...pieces.map(piece => piece.c + piece.cols));
        const placedPieces = pieces.map(piece => ({
            piece,
            canvasRow: Number.isFinite(piece.canvasR) ? piece.canvasR : piece.r - minRow,
            canvasCol: Number.isFinite(piece.canvasC) ? piece.canvasC : piece.c - minCol
        }));
        const localRows = Math.max(1, ...placedPieces.map(item => item.canvasRow + item.piece.rows));
        const localCols = Math.max(1, ...placedPieces.map(item => item.canvasCol + item.piece.cols));
        const canvasCols = Math.max(localCols, plan.maxCols || plan._rawPlan?.maxCols || localCols);
        const cellWidth = Math.max(18, Math.min(maxCellWidth, Math.floor(maxStageWidth / Math.max(1, canvasCols))));
        const toneIndex = displayIndex + 1;
        const tone = getControllerTone(toneIndex);
        const borderColor = controllerBorderColor(toneIndex);
        const controllerLabel = `Processor ${displayIndex + 1}`;
        const pieceLabel = pieces
            .map(piece => `Rows ${piece.r + 1}-${piece.r + piece.rows} · Cols ${piece.c + 1}-${piece.c + piece.cols}`)
            .join(' / ');

        const occupied = new Map();
        placedPieces.forEach(({ piece, canvasRow, canvasCol }) => {
            for (let sourceRow = piece.r; sourceRow < piece.r + piece.rows; sourceRow++) {
                for (let sourceCol = piece.c; sourceCol < piece.c + piece.cols; sourceCol++) {
                    const localRow = canvasRow + sourceRow - piece.r;
                    const localCol = canvasCol + sourceCol - piece.c;
                    const cell = matrix[sourceRow]?.[sourceCol];
                    if (cell) {
                        occupied.set(`${localRow},${localCol}`, { cell, sourceRow, sourceCol, localRow, localCol });
                    }
                }
            }
        });
        const canvasRowProfile = getProcessorCanvasRows(
            canvas,
            occupied,
            localRows,
            plan.maxRows || plan._rawPlan?.maxRows || localRows,
            unitWidth
        );
        const canvasRows = canvasRowProfile.canvasRows;
        const rowRatios = canvasRowProfile.rowRatios;
        const rowHeights = rowRatios.map(ratio => Math.max(12, Math.round(cellWidth * ratio)));
        const rowOffsets = [0];
        for (let rowIndex = 0; rowIndex < rowHeights.length; rowIndex++) {
            rowOffsets.push(rowOffsets[rowIndex] + rowHeights[rowIndex] + gridGap);
        }
        const canvasMeta = getProcessorCanvasMeta(pieces, occupied, rowRatios, unitWidth);

        const gridWidth = canvasCols * cellWidth + Math.max(0, canvasCols - 1) * gridGap;
        const gridHeight = rowOffsets[canvasRows] - gridGap;
        const stageWidth = gridWidth + 6;
        const stageHeight = gridHeight + 6;

        const ports = [...new Set([...occupied.values()].map(item => parseInt(item.cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10)))].sort((first, second) => first - second);
        const portIndex = new Map(ports.map((port, index) => [port, index]));
        const stageId = `processor-stage-${controller.id}`;
        let stageGrid = `<div class="canvas-card-stage" style="width:${stageWidth}px;height:${stageHeight}px;">`;
        stageGrid += `<div style="position:absolute;inset:3px;display:grid;grid-template-columns:repeat(${canvasCols}, ${cellWidth}px);grid-template-rows:${rowHeights.map(height => `${height}px`).join(' ')};gap:${gridGap}px;">`;

        for (let localRow = 0; localRow < canvasRows; localRow++) {
            for (let localCol = 0; localCol < canvasCols; localCol++) {
                const item = occupied.get(`${localRow},${localCol}`);
                const rowHeight = rowHeights[localRow];
                if (item) {
                    const cell = item.cell;
                    const portNum = parseInt(cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10);
                    const portOrder = portIndex.get(portNum) ?? 0;
                    const fill = portFillColor(toneIndex, portOrder, localRow, localCol, document.getElementById('routeDirectionSelect')?.value, 'processor');
                    const fontSize = Math.max(6, Math.min(10, cellWidth * 0.27, rowHeight * 0.34));
                    stageGrid += `<div style="width:${cellWidth}px;height:${rowHeight}px;background:${fill};border:1px solid rgba(255,255,255,0.35);border-radius:2px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:${fontSize}px;font-family:'JetBrains Mono',monospace;font-weight:800;line-height:1;white-space:nowrap;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,0.55);" title="${cell.portLabel}">${cell.portLabel}</div>`;
                } else {
                    stageGrid += `<div style="width:${cellWidth}px;height:${rowHeight}px;background:#f8fafc;border:1px solid #d8e0eb;border-radius:2px;"></div>`;
                }
            }
        }
        stageGrid += `</div>`;
        const groups = {};
        [...occupied.values()].forEach(item => {
            const match = item.cell.portLabel.match(/D(\d+)-(\d+)/);
            if (!match) return;
            const portNum = parseInt(match[1], 10);
            const sequence = parseInt(match[2], 10);
            if (!groups[portNum]) groups[portNum] = [];
            const cellLeft = item.localCol * (cellWidth + gridGap) + 3;
            const cellTop = rowOffsets[item.localRow] + 3;
            groups[portNum].push({
                sequence,
                x: cellLeft + cellWidth / 2,
                y: cellTop + rowHeights[item.localRow] / 2,
                localRow: item.localRow,
                localCol: item.localCol,
                box: { left: cellLeft, top: cellTop, right: cellLeft + cellWidth, bottom: cellTop + rowHeights[item.localRow], width: cellWidth, height: rowHeights[item.localRow] }
            });
        });

        let paths = '';
        const laneOffset = 0;
        // 网线纯色实线，不用箭头
        const processorArrowPath = (p1, p2) => {
            const mainInset = 0.28;
            const sideInset = 0.18;
            if (p1.localCol === p2.localCol && p1.localRow !== p2.localRow) {
                const goingDown = p2.localRow > p1.localRow;
                const startY = goingDown ? p1.y + p1.box.height * mainInset : p1.y - p1.box.height * mainInset;
                const endY   = goingDown ? p2.y - p2.box.height * mainInset : p2.y + p2.box.height * mainInset;
                return `M ${p1.x} ${startY} L ${p2.x} ${endY}`;
            }
            if (p1.localCol !== p2.localCol) {
                const goingRight = p2.localCol > p1.localCol;
                const startX = goingRight ? p1.box.right - p1.box.width * sideInset : p1.box.left + p1.box.width * sideInset;
                const endX   = goingRight ? p2.box.left + p2.box.width * sideInset : p2.box.right - p2.box.width * sideInset;
                if (p1.localRow === p2.localRow) {
                    return `M ${startX} ${p1.y} L ${endX} ${p2.y}`;
                }
                const gapCenterX = ((p1.box.right + p2.box.left) / 2) + laneOffset;
                return `M ${startX} ${p1.y} L ${gapCenterX} ${p1.y} L ${gapCenterX} ${p2.y} L ${endX} ${p2.y}`;
            }
            return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
        };
        Object.keys(groups).sort((first, second) => parseInt(first, 10) - parseInt(second, 10)).forEach(portNum => {
            const points = groups[portNum].sort((first, second) => first.sequence - second.sequence);
            if (points.length <= 1) return;
            for (let pointIndex = 1; pointIndex < points.length; pointIndex++) {
                const d = processorArrowPath(points[pointIndex - 1], points[pointIndex]);
                paths += `<path d="${d}" stroke="#1e9bff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"></path>`;
            }
        });

        html += `<div class="canvas-card">
            <div class="canvas-card-header">
                <span class="canvas-card-title">${controllerLabel}</span>
            </div>
            ${stageGrid}<svg id="${stageId}-svg" style="position:absolute;inset:0;width:${stageWidth}px;height:${stageHeight}px;pointer-events:none;z-index:3;">${paths}</svg></div>
        </div>`;
    });

    container.innerHTML = html;
}

function shouldTilePdfMatrix(matrix) {
    if (!matrix || !matrix.length) return false;
    const rows = matrix.length;
    const cols = matrix[0]?.length || 0;
    return rows * cols > 80 || cols > 12 || rows > 8;
}

function clearPdfDetailPages() {
    document.querySelectorAll('.pdf-detail-pages').forEach(node => node.remove());
    ['a4page1', 'a4page2'].forEach(id => {
        const page = document.getElementById(id);
        if (page) delete page.dataset.pdfSkip;
    });
}

function getPdfControllerColorMaps(matrix) {
    const controllerIds = [...new Set(matrix.flat().map(cell => cell.controllerId || 1))].sort((a, b) => a - b);
    const controllerIndexMap = new Map(controllerIds.map((cid, index) => [cid, index + 1]));
    const portIndexMap = new Map();
    controllerIds.forEach(cid => {
        const ports = [...new Set(matrix.flat()
            .filter(cell => (cell.controllerId || 1) === cid)
            .map(cell => parseInt(cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10)))]
            .sort((a, b) => a - b);
        portIndexMap.set(cid, new Map(ports.map((port, index) => [port, index])));
    });
    return { controllerIndexMap, portIndexMap };
}

function createPdfMatrixTile(matrix, rowStart, rowEnd, colStart, colEnd, mode) {
    const unitWidth = currentProductObj.pixelW || 1;
    const ratio = (currentProductObj.pixelH || unitWidth) / unitWidth;
    const baseW = 96;
    const fullHeight = Math.min(140, Math.max(60, baseW * ratio));
    const halfHeight = fullHeight / 2;
    const tileCols = colEnd - colStart;
    const maps = getPdfControllerColorMaps(matrix);
    const isPower = mode === 'power';
    let html = `<div class="matrix-visual pdf-tile-visual ${isPower ? 'pdf-power-tile-visual' : 'pdf-topology-tile-visual'}" data-tile-mode="${mode}" data-row-start="${rowStart}" data-col-start="${colStart}" style="grid-template-columns: repeat(${tileCols}, ${baseW}px);">`;
    for (let r = rowStart; r < rowEnd; r++) {
        for (let c = colStart; c < colEnd; c++) {
            const cell = matrix[r][c];
            const height = cell.type === 'Half' ? halfHeight : fullHeight;
            if (isPower) {
                const tone = powerMappingTone(cell.powerLabel);
                const powerFont = adaptiveMatrixLabelPx(matrix, cell.powerLabel, baseW, height, 9);
                html += `<div class="cab-module" data-pdf-row="${r}" data-pdf-col="${c}" style="height:${height}px;background:${tone.fill};border:1.5px solid ${tone.border};box-shadow:none;"><div class="power-text" style="font-size:${powerFont.toFixed(2)}px">${cell.powerLabel}</div></div>`;
            } else {
                const cid = cell.controllerId || 1;
                const toneIndex = maps.controllerIndexMap.get(cid) || 1;
                const portNum = parseInt(cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10);
                const portIdx = maps.portIndexMap.get(cid)?.get(portNum) ?? 0;
                const fill = portFillColor(toneIndex, portIdx, r, c, document.getElementById('routeDirectionSelect')?.value, 'topology');
                const powerFont = adaptiveMatrixLabelPx(matrix, cell.powerLabel, baseW, height, 8);
                const portFont = adaptiveMatrixLabelPx(matrix, cell.portLabel, baseW, height, 8);
                html += `<div class="cab-module" data-pdf-row="${r}" data-pdf-col="${c}" style="height:${height}px;background:${fill};"><div class="power-text" style="font-size:${powerFont.toFixed(2)}px">${cell.powerLabel}</div><div style="height:${Math.max(1, height * 0.08).toFixed(1)}px;"></div><div class="port-text" style="font-size:${portFont.toFixed(2)}px">${cell.portLabel}</div></div>`;
            }
        }
    }
    html += '</div>';
    const wrapper = document.createElement('div');
    wrapper.innerHTML = html;
    return wrapper.firstElementChild;
}

function createPdfTilePage(title, rangeText, tile, statsNode) {

    page.className = 'a4-page pdf-detail-page';

    pageTitle.className = 'a4-page-title';
    pageTitle.textContent = `${title} ? ${rangeText}`;
    page.appendChild(pageTitle);
    if (statsNode) page.appendChild(statsNode.cloneNode(true));
    const content = document.createElement('div');
    content.className = 'pdf-tile-content';
    content.appendChild(tile);
    page.appendChild(content);
    return page;
}

function getPdfTileRanges(matrix, tileCols, tileRows) {
    const rows = matrix.length;
    const cols = matrix[0]?.length || 0;
    const ranges = [];
    for (let rowStart = 0; rowStart < rows; rowStart += tileRows) {
        const rowEnd = Math.min(rows, rowStart + tileRows);
        for (let colStart = 0; colStart < cols; colStart += tileCols) {
            const colEnd = Math.min(cols, colStart + tileCols);
            ranges.push({ rowStart, rowEnd, colStart, colEnd });
        }
    }
    return ranges;
}

function drawPdfTileLines(tile, matrix, mode) {
    if (!tile) return;
    const rowStart = parseInt(tile.dataset.rowStart || '0', 10);
    const colStart = parseInt(tile.dataset.colStart || '0', 10);
    const rowCount = Math.round(tile.children.length / Math.max(1, parseInt((tile.style.gridTemplateColumns.match(/repeat\((\d+)/) || [0, 1])[1], 10)));
    const direction = document.getElementById('routeDirectionSelect').value;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.style.position = 'absolute';
    svg.style.left = '0';
    svg.style.top = '0';
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.pointerEvents = 'none';
    svg.style.zIndex = '2';
    tile.style.position = 'relative';
    tile.appendChild(svg);

    const groupsPower = {};
    const groupsData = {};
    for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[0].length; c++) {
            const el = tile.querySelector(`[data-pdf-row="${r}"][data-pdf-col="${c}"]`);
            if (!el) continue;
            const cell = matrix[r][c];
            const cx = el.offsetLeft + el.offsetWidth / 2;
            const cy = el.offsetTop + el.offsetHeight / 2;
            const box = { left: el.offsetLeft, right: el.offsetLeft + el.offsetWidth, top: el.offsetTop, bottom: el.offsetTop + el.offsetHeight, width: el.offsetWidth, height: el.offsetHeight };
            const powerMatch = cell.powerLabel.match(/P(\d+)-(\d+)/);
            if (powerMatch) {
                const id = `P${powerMatch[1]}`;
                if (!groupsPower[id]) groupsPower[id] = [];
                groupsPower[id].push({
                    seq: parseInt(powerMatch[2], 10),
                    x: mode === 'power' ? cx : direction === 'vertical' ? cx - 12 : cx,
                    y: mode === 'power' ? cy : direction === 'vertical' ? cy : cy - 8,
                    r, c, box
                });
            }
            if (mode === 'topology') {
                const dataMatch = cell.portLabel.match(/D(\d+)-(\d+)/);
                if (dataMatch) {
                    const id = `D${dataMatch[1]}`;
                    if (!groupsData[id]) groupsData[id] = [];
                    groupsData[id].push({ seq: parseInt(dataMatch[2], 10), x: direction === 'vertical' ? cx + 12 : cx, y: direction === 'vertical' ? cy : cy + 8, r, c, box });
                }
            }
        }
    }

    const mid = (a, b) => (a + b) / 2;
    const pathFor = (p1, p2, laneOffset = 0) => {
        const verticalMainInset = 0.28;
        const horizontalMainInset = 0.18;
        const sideInset = 0.18;
        if (direction === 'vertical') {
            if (p1.c === p2.c && p1.r !== p2.r) {
                const down = p2.r > p1.r;
                return `M ${p1.x} ${down ? p1.y + p1.box.height * verticalMainInset : p1.y - p1.box.height * verticalMainInset} L ${p2.x} ${down ? p2.y - p2.box.height * verticalMainInset : p2.y + p2.box.height * verticalMainInset}`;
            }
            if (p1.c !== p2.c) {
                const right = p2.c > p1.c;
                const startX = right ? p1.box.right - p1.box.width * sideInset : p1.box.left + p1.box.width * sideInset;
                const endX = right ? p2.box.left + p2.box.width * sideInset : p2.box.right - p2.box.width * sideInset;
                const seamX = right ? mid(p1.box.right, p2.box.left) : mid(p1.box.left, p2.box.right);
                const startY = p1.y + laneOffset;
                const endY = p2.y + laneOffset;
                return p1.r === p2.r ? `M ${startX} ${startY} L ${seamX} ${startY} L ${endX} ${startY}` : `M ${startX} ${startY} L ${seamX} ${startY} L ${seamX} ${endY} L ${endX} ${endY}`;
            }
        } else {
            if (p1.r === p2.r && p1.c !== p2.c) {
                const right = p2.c > p1.c;
                const startX = right ? p1.x + p1.box.width * horizontalMainInset : p1.x - p1.box.width * horizontalMainInset;
                const endX = right ? p2.x - p2.box.width * horizontalMainInset : p2.x + p2.box.width * horizontalMainInset;
                return `M ${startX} ${p1.y + laneOffset} L ${endX} ${p2.y + laneOffset}`;
            }
            if (p1.r !== p2.r) {
                const down = p2.r > p1.r;
                const startY = down ? p1.box.bottom - p1.box.height * sideInset : p1.box.top + p1.box.height * sideInset;
                const endY = down ? p2.box.top + p2.box.height * sideInset : p2.box.bottom - p2.box.height * sideInset;
                const seamY = down ? mid(p1.box.bottom, p2.box.top) : mid(p1.box.top, p2.box.bottom);
                const startX = p1.x + laneOffset;
                const endX = p2.x + laneOffset;
                return p1.c === p2.c ? `M ${startX} ${startY} L ${startX} ${seamY} L ${startX} ${endY}` : `M ${startX} ${startY} L ${startX} ${seamY} L ${endX} ${seamY} L ${endX} ${endY}`;
            }
        }
        return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
    };

    const drawGroups = (groups, color, laneOffset, usePowerTone) => {
        Object.entries(groups).forEach(([id, points]) => {
            points.sort((a, b) => a.seq - b.seq);
            const stroke = usePowerTone ? powerMappingTone(id).line : color;
            for (let i = 1; i < points.length; i++) {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathFor(points[i - 1], points[i], laneOffset));
                path.setAttribute('stroke', stroke);
                path.setAttribute('stroke-width', mode === 'power' ? '2.1' : '2.3');
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                path.setAttribute('opacity', '0.96');
                svg.appendChild(path);
            }
        });
    };

    drawGroups(groupsPower, '#e8382c', 0, mode === 'power');
    if (mode === 'topology') drawGroups(groupsData, '#007ee8', 0, false);
}

function pdfColorToRgb(color, fallback = [0, 0, 0]) {
    if (!color || color === 'transparent') return null;
    const hex = color.match(/^#([0-9a-f]{6})$/i);
    if (hex) {
        const n = parseInt(hex[1], 16);
        return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }
    const hsl = color.match(/hsla?\(([-\d.]+),\s*([\d.]+)%,\s*([\d.]+)%(?:,\s*([\d.]+))?/i);
    if (!hsl) return fallback;
    let h = ((parseFloat(hsl[1]) % 360) + 360) % 360;
    let s = parseFloat(hsl[2]) / 100;
    let l = parseFloat(hsl[3]) / 100;
    const alpha = hsl[4] === undefined ? 1 : Math.max(0, Math.min(1, parseFloat(hsl[4])));
    const c = (1 - Math.abs(2 * l - 1)) * s;
    const x = c * (1 - Math.abs((h / 60) % 2 - 1));
    const m = l - c / 2;
    let r = 0, g = 0, b = 0;
    if (h < 60) [r, g, b] = [c, x, 0];
    else if (h < 120) [r, g, b] = [x, c, 0];
    else if (h < 180) [r, g, b] = [0, c, x];
    else if (h < 240) [r, g, b] = [0, x, c];
    else if (h < 300) [r, g, b] = [x, 0, c];
    else [r, g, b] = [c, 0, x];
    const solid = [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
    return solid.map(value => Math.round(255 * (1 - alpha) + value * alpha));
}

function pdfSetColor(pdf, method, color, fallback) {
    const rgb = pdfColorToRgb(color, fallback);
    if (!rgb) return false;
    pdf[method](rgb[0], rgb[1], rgb[2]);
    return true;
}

function getProcessorCanvasRows(canvas, occupied, localRows, planRows, unitWidth) {
    const panelPixelH = currentProductObj.pixelH || unitWidth;
    const panelRatio = Math.max(0.25, panelPixelH / unitWidth);
    const exactRows = Math.max(1, canvas.height / panelPixelH);
    const fullRows = Math.floor(exactRows + 1e-9);
    const remainder = exactRows - fullRows;
    const capacityRows = fullRows + (remainder > 1e-6 ? 1 : 0);
    const canvasRows = Math.max(localRows, capacityRows, planRows || localRows);
    const rowRatios = Array.from({ length: canvasRows }, (_, localRow) => {
        const rowCells = [...occupied.values()].filter(item => item.localRow === localRow);
        if (rowCells.length) {
            const pixelHeight = Math.max(...rowCells.map(item => item.cell.pixelH || panelPixelH));
            return Math.max(0.25, pixelHeight / unitWidth);
        }
        if (remainder > 1e-6 && localRow === fullRows) {
            return Math.max(0.05, panelRatio * remainder);
        }
        return panelRatio;
    });
    return { canvasRows, rowRatios };
}

function pdfAdaptiveLabelFont(pdf, matrix, text, box, preferredPt, heightFraction = 0.3) {
    const resolution = getMatrixResolution(matrix);
    const rows = matrix?.length || 1;
    const cols = matrix?.[0]?.length || 1;
    const density = Math.max(1, resolution.width / 1920, resolution.height / 1080, cols / 12, rows / 8);
    let size = preferredPt / Math.sqrt(density);
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(size);
    const textWidth = Math.max(0.01, pdf.getTextWidth(String(text || '')));
    const widthScale = (box.width * 0.76) / textWidth;
    const maxByHeight = box.height * heightFraction * 2.834;
    size = Math.min(size, size * widthScale, maxByHeight);
    return Math.max(0.35, size);
}

function pdfGetMatrixLayout(matrix, x, y, w, h) {
    const rows = matrix.length;
    const cols = matrix[0]?.length || 1;
    const unitWidth = currentProductObj.pixelW || 1;
    const rowRatios = Array.from({ length: rows }, (_, r) => {
        const rowPixelH = matrix[r]?.[0]?.pixelH || currentProductObj.pixelH || unitWidth;
        return Math.max(0.18, rowPixelH / unitWidth);
    });
    const ratioSum = rowRatios.reduce((sum, value) => sum + value, 0);
    const baseNoGap = Math.min(w / Math.max(1, cols), h / Math.max(0.1, ratioSum));
    const gap = Math.max(1.0, Math.min(2.8, baseNoGap * 0.16));
    const cellW = Math.min(
        (w - gap * Math.max(0, cols - 1)) / Math.max(1, cols),
        (h - gap * Math.max(0, rows - 1)) / Math.max(0.1, ratioSum)
    );
    const rowHeights = rowRatios.map(ratio => cellW * ratio);
    const contentW = cols * cellW + gap * Math.max(0, cols - 1);
    const contentH = rowHeights.reduce((sum, value) => sum + value, 0) + gap * Math.max(0, rows - 1);
    const offsetX = x + Math.max(0, (w - contentW) / 2);
    const offsetY = y + Math.max(0, (h - contentH) / 2);
    const rowOffsets = [0];
    for (let i = 0; i < rowHeights.length; i++) rowOffsets.push(rowOffsets[i] + rowHeights[i] + gap);
    return { rows, cols, x: offsetX, y: offsetY, w: contentW, h: contentH, gap, cellW, cellH: rowHeights[0] || cellW, rowHeights, rowOffsets };
}

function pdfCellBox(layout, r, c) {
    const top = layout.y + (layout.rowOffsets ? layout.rowOffsets[r] : r * (layout.cellH + layout.gap));
    const height = layout.rowHeights ? layout.rowHeights[r] : layout.cellH;
    const left = layout.x + c * (layout.cellW + layout.gap);
    return {
        left,
        top,
        width: layout.cellW,
        height,
        right: left + layout.cellW,
        bottom: top + height
    };
}

function getPdfStatsData() {
    if (!lastMatrix?.length) return [];
    const rows = lastMatrix.length;
    const cols = lastMatrix[0]?.length || 0;
    const totalResW = cols * (currentProductObj.pixelW || 0);
    const totalResH = lastMatrix.reduce((sum, row) => sum + (row[0]?.pixelH || currentProductObj.pixelH || 0), 0);
    const screenSize = getScreenSizeLabel();
    const canvas = _lastControllerPlan?.canvas || getCurrentMasterCanvas();
    const powerIds = new Set();
    const dataIds = new Set();
    lastMatrix.flat().forEach(cell => {
        const p = cell.powerLabel?.match(/P(\d+)/);
        const d = cell.portLabel?.match(/D(\d+)/);
        if (p) powerIds.add(p[1]);
        if (d) dataIds.add(d[1]);
    });
    const countSegments = (labelField, prefix) => {
        const groups = {};
        const direction = document.getElementById('routeDirectionSelect')?.value || 'vertical';
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const match = (lastMatrix[r][c][labelField] || '').match(new RegExp(`${prefix}(\\d+)-(\\d+)`));
                if (!match) continue;
                const id = `${prefix}${match[1]}`;
                if (!groups[id]) groups[id] = [];
                groups[id].push({ seq: parseInt(match[2], 10), r, c });
            }
        }
        let shortCount = 0;
        let jumperCount = 0;
        Object.values(groups).forEach(points => {
            points.sort((a, b) => a.seq - b.seq);
            for (let i = 1; i < points.length; i++) {
                const prev = points[i - 1];
                const cur = points[i];
                const jumper = direction === 'horizontal' ? prev.r !== cur.r : prev.c !== cur.c;
                if (jumper) jumperCount++; else shortCount++;
            }
        });
        return { shortCount, jumperCount };
    };
    const powerSeg = countSegments('powerLabel', 'P');
    const dataSeg = countSegments('portLabel', 'D');
    return [
        ['Total Resolution', `${totalResW.toLocaleString()} x ${Math.floor(totalResH).toLocaleString()} px`],
        ['Master Canvas', `${canvas.key} ${canvas.width} x ${canvas.height} px`],
        ['Main Power', `${powerIds.size} Feeds`],
        ['Short Power', `${powerSeg.shortCount} pcs`],
        ['Power Jumpers', `${powerSeg.jumperCount} pcs`],
        ['Screen Size', `${screenSize} Panels`],
        ['Processors', `${_lastControllerPlan?.controllerSummaries?.length || 0} Units`],
        ['Main Data', `${dataIds.size} Feeds`],
        ['Short Data', `${dataSeg.shortCount} pcs`],
        ['Data Jumpers', `${dataSeg.jumperCount} pcs`]
    ];
}

function pdfPathPoints(p1, p2, laneOffset, direction) {
    const verticalMainInset = 0.28;
    const horizontalMainInset = 0.18;
    const sideInset = 0.18;
    const mid = (a, b) => (a + b) / 2;
    if (direction === 'vertical') {
        if (p1.c === p2.c && p1.r !== p2.r) {
            const down = p2.r > p1.r;
            return [[p1.x, down ? p1.y + p1.box.height * verticalMainInset : p1.y - p1.box.height * verticalMainInset], [p2.x, down ? p2.y - p2.box.height * verticalMainInset : p2.y + p2.box.height * verticalMainInset]];
        }
        if (p1.c !== p2.c) {
            const right = p2.c > p1.c;
            const startX = right ? p1.box.right - p1.box.width * sideInset : p1.box.left + p1.box.width * sideInset;
            const endX = right ? p2.box.left + p2.box.width * sideInset : p2.box.right - p2.box.width * sideInset;
            const seamX = right ? mid(p1.box.right, p2.box.left) : mid(p1.box.left, p2.box.right);
            const startY = p1.y + laneOffset;
            const endY = p2.y + laneOffset;
            return p1.r === p2.r ? [[startX, startY], [seamX, startY], [endX, startY]] : [[startX, startY], [seamX, startY], [seamX, endY], [endX, endY]];
        }
    } else {
        if (p1.r === p2.r && p1.c !== p2.c) {
            const right = p2.c > p1.c;
            return [[right ? p1.x + p1.box.width * horizontalMainInset : p1.x - p1.box.width * horizontalMainInset, p1.y + laneOffset], [right ? p2.x - p2.box.width * horizontalMainInset : p2.x + p2.box.width * horizontalMainInset, p2.y + laneOffset]];
        }
        if (p1.r !== p2.r) {
            const down = p2.r > p1.r;
            const startY = down ? p1.box.bottom - p1.box.height * sideInset : p1.box.top + p1.box.height * sideInset;
            const endY = down ? p2.box.top + p2.box.height * sideInset : p2.box.bottom - p2.box.height * sideInset;
            const seamY = down ? mid(p1.box.bottom, p2.box.top) : mid(p1.box.top, p2.box.bottom);
            const startX = p1.x + laneOffset;
            const endX = p2.x + laneOffset;
            return p1.c === p2.c ? [[startX, startY], [startX, seamY], [startX, endY]] : [[startX, startY], [startX, seamY], [endX, seamY], [endX, endY]];
        }
    }
    return [[p1.x, p1.y], [p2.x, p2.y]];
}

function pdfPowerPathPoints(p1, p2, laneOffset, direction) {
    const mid = (a, b) => (a + b) / 2;
    const verticalMainInset = 0.24;
    const horizontalMainInset = 0.18;
    const sideInset = 0.18;
    if (direction === 'vertical') {
        if (p1.c === p2.c && p1.r !== p2.r) {
            const down = p2.r > p1.r;
            const startY = down ? p1.y + p1.box.height * verticalMainInset : p1.y - p1.box.height * verticalMainInset;
            const endY = down ? p2.y - p2.box.height * verticalMainInset : p2.y + p2.box.height * verticalMainInset;
            return [[p1.x, startY], [p2.x, endY]];
        }
        if (p1.c !== p2.c) {
            const right = p2.c > p1.c;
            const startX = right ? p1.box.right - p1.box.width * sideInset : p1.box.left + p1.box.width * sideInset;
            const endX = right ? p2.box.left + p2.box.width * sideInset : p2.box.right - p2.box.width * sideInset;
            const seamX = right ? mid(p1.box.right, p2.box.left) : mid(p1.box.left, p2.box.right);
            const startY = p1.y + laneOffset;
            const endY = p2.y + laneOffset;
            return p1.r === p2.r
                ? [[startX, startY], [seamX, startY], [endX, startY]]
                : [[startX, startY], [seamX, startY], [seamX, endY], [endX, endY]];
        }
    } else {
        if (p1.r === p2.r && p1.c !== p2.c) {
            const right = p2.c > p1.c;
            const startX = right ? p1.x + p1.box.width * horizontalMainInset : p1.x - p1.box.width * horizontalMainInset;
            const endX = right ? p2.x - p2.box.width * horizontalMainInset : p2.x + p2.box.width * horizontalMainInset;
            return [[startX, p1.y + laneOffset], [endX, p2.y + laneOffset]];
        }
        if (p1.r !== p2.r) {
            const down = p2.r > p1.r;
            const startY = down ? p1.box.bottom - p1.box.height * sideInset : p1.box.top + p1.box.height * sideInset;
            const endY = down ? p2.box.top + p2.box.height * sideInset : p2.box.bottom - p2.box.height * sideInset;
            const seamY = down ? mid(p1.box.bottom, p2.box.top) : mid(p1.box.top, p2.box.bottom);
            const startX = p1.x + laneOffset;
            const endX = p2.x + laneOffset;
            return p1.c === p2.c
                ? [[startX, startY], [startX, seamY], [startX, endY]]
                : [[startX, startY], [startX, seamY], [endX, seamY], [endX, endY]];
        }
    }
    return [[p1.x, p1.y], [p2.x, p2.y]];
}

function pdfDrawPolyline(pdf, points, color, width, trimEnd = 0) {
    if (!points || points.length < 2) return;
    const drawPoints = points.map(point => [point[0], point[1]]);
    if (trimEnd > 0 && drawPoints.length >= 2) {
        const last = drawPoints[drawPoints.length - 1];
        const prev = drawPoints[drawPoints.length - 2];
        const dx = last[0] - prev[0];
        const dy = last[1] - prev[1];
        const len = Math.hypot(dx, dy) || 1;
        const trim = Math.min(trimEnd, len * 0.65);
        drawPoints[drawPoints.length - 1] = [last[0] - dx / len * trim, last[1] - dy / len * trim];
    }
    pdfSetColor(pdf, 'setDrawColor', color, [17, 24, 39]);
    pdf.setLineWidth(width);
    for (let i = 1; i < drawPoints.length; i++) pdf.line(drawPoints[i - 1][0], drawPoints[i - 1][1], drawPoints[i][0], drawPoints[i][1]);
}

function pdfDrawArrowHead(pdf, p1, p2, color, size) {
    const angle = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
    const wing = size * 0.82;
    const back = size * 1.45;
    const baseX = p2[0] - Math.cos(angle) * back;
    const baseY = p2[1] - Math.sin(angle) * back;
    const normalX = -Math.sin(angle);
    const normalY = Math.cos(angle);
    const left = [baseX + normalX * wing, baseY + normalY * wing];
    const right = [baseX - normalX * wing, baseY - normalY * wing];
    pdfSetColor(pdf, 'setFillColor', color, [232, 56, 44]);
    pdf.triangle(p2[0], p2[1], left[0], left[1], right[0], right[1], 'F');
}

function pdfDrawVectorMap(pdf, mode, pageTitle, includeStats, PW, PH) {
    if (!lastMatrix?.length) return;
    const margin = 26;
    const headerBottom = 25;
    const footerTop = PH - 31;
    pdf.setFillColor(255, 255, 255);
    pdf.rect(0, 0, PW, PH, 'F');
    if (_pdfLetterheadImage) pdf.addImage(_pdfLetterheadImage, 'PNG', 0, 0, PW, PH);
    pdfDrawSectionTitle(pdf, pageTitle, margin, headerBottom + 6);
    let top = headerBottom + 11;
    if (mode === 'power') top += pdfDrawInfoStrip(pdf, getPowerInfoItems(), margin, top, PW - margin * 2, 4) + 4;
    if (includeStats) top += pdfDrawStats(pdf, margin, top, PW - margin * 2) + 6;
    const layout = pdfGetMatrixLayout(lastMatrix, margin, top, PW - margin * 2, footerTop - top);
    const direction = document.getElementById('routeDirectionSelect').value;
    const maps = getPdfControllerColorMaps(lastMatrix);
    const groupsPower = {};
    const groupsData = {};
    const labels = [];

    for (let r = 0; r < layout.rows; r++) {
        for (let c = 0; c < layout.cols; c++) {
            const cell = lastMatrix[r][c];
            const box = pdfCellBox(layout, r, c);
            const cx = box.left + box.width / 2;
            const cy = box.top + box.height / 2;
            if (mode === 'power') {
                const tone = powerMappingTone(cell.powerLabel);
                const fillRgb = pdfColorToRgb(tone.fill);
                pdfSetColor(pdf, 'setDrawColor', tone.border, [255, 126, 110]);
                if (fillRgb) {
                    pdf.setFillColor(fillRgb[0], fillRgb[1], fillRgb[2]);
                    pdf.rect(box.left, box.top, box.width, box.height, 'FD');
                } else {
                    pdf.rect(box.left, box.top, box.width, box.height, 'S');
                }
            } else {
                const cid = cell.controllerId || 1;
                const toneIndex = maps.controllerIndexMap.get(cid) || 1;
                const portNum = parseInt(cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10);
                const portIdx = maps.portIndexMap.get(cid)?.get(portNum) ?? 0;
                const fill = portFillColor(toneIndex, portIdx, r, c, direction, 'topology');
                const fillRgb = pdfColorToRgb(fill);
                pdf.setDrawColor(31, 41, 55);
                pdf.setLineWidth(0.08);
                if (fillRgb) {
                    pdf.setFillColor(fillRgb[0], fillRgb[1], fillRgb[2]);
                    pdf.rect(box.left, box.top, box.width, box.height, 'FD');
                } else {
                    pdf.rect(box.left, box.top, box.width, box.height, 'S');
                }
            }
            const powerMatch = cell.powerLabel.match(/P(\d+)-(\d+)/);
            if (powerMatch) {
                const id = `P${powerMatch[1]}`;
                if (!groupsPower[id]) groupsPower[id] = [];
                groupsPower[id].push({
                    seq: parseInt(powerMatch[2], 10),
                    x: mode === 'power' ? cx : direction === 'vertical' ? cx - box.width * 0.18 : cx,
                    y: mode === 'power' ? cy : direction === 'vertical' ? cy : cy - box.height * 0.18,
                    r, c, box
                });
            }
            if (mode === 'topology') {
                const dataMatch = cell.portLabel.match(/D(\d+)-(\d+)/);
                if (dataMatch) {
                    const id = `D${dataMatch[1]}`;
                    if (!groupsData[id]) groupsData[id] = [];
                    groupsData[id].push({ seq: parseInt(dataMatch[2], 10), x: direction === 'vertical' ? cx + box.width * 0.18 : cx, y: direction === 'vertical' ? cy : cy + box.height * 0.18, r, c, box });
                }
            }
            labels.push({ cell, x: cx, y: cy, box });
        }
    }

    const drawGroups = (groups, color, laneOffset, powerTone, arrow) => {
        Object.entries(groups).forEach(([id, points]) => {
            points.sort((a, b) => a.seq - b.seq);
            const stroke = powerTone ? powerMappingTone(id).line : color;
            for (let i = 1; i < points.length; i++) {
                const pts = arrow ? pdfPowerPathPoints(points[i - 1], points[i], laneOffset, direction) : pdfPathPoints(points[i - 1], points[i], laneOffset, direction);
                const arrowSize = 0.9;
                const isJumper = direction === 'horizontal' ? points[i - 1].r !== points[i].r : points[i - 1].c !== points[i].c;
                const width = (mode === 'power' ? 0.36 : 0.4) + (isJumper ? 0.14 : 0);
                pdfDrawPolyline(pdf, pts, stroke, width, arrow ? arrowSize * 1.15 : 0);
                if (arrow && pts.length >= 2) pdfDrawArrowHead(pdf, pts[pts.length - 2], pts[pts.length - 1], stroke, arrowSize);
            }
        });
    };
    drawGroups(groupsPower, '#e8382c', 0, mode === 'power', mode === 'power');
    if (mode === 'topology') drawGroups(groupsData, '#007ee8', 0, false, false);

    labels.forEach(({ cell, x, y, box }) => {
        if (mode === 'power') {
            const font = pdfAdaptiveLabelFont(pdf, lastMatrix, cell.powerLabel, box, 5, 0.32);
            pdfDrawBadgeText(pdf, cell.powerLabel, x, y + font * 0.02, font, '#ff4f3d', '#ffffff', 'normal');
        } else {
            const gap = Math.max(1.25, box.height * 0.14);
            const powerFont = pdfAdaptiveLabelFont(pdf, lastMatrix, cell.powerLabel, box, 4.4, 0.2);
            const portFont = pdfAdaptiveLabelFont(pdf, lastMatrix, cell.portLabel, box, 4.4, 0.2);
            pdfDrawBadgeText(pdf, cell.powerLabel, x, y - gap, powerFont, '#ff4f3d', '#ffffff', 'normal');
            pdfDrawBadgeText(pdf, cell.portLabel, x, y + gap, portFont, '#1e9bff', '#ffffff', 'normal');
        }
    });
}

function getProcessorPdfPageData() {
    if (!_lastControllerPlan || !lastMatrix?.length) return [];
    const plan = _lastControllerPlan;
    const canvas = plan.canvas;
    const matrix = lastMatrix;
    const unitWidth = currentProductObj.pixelW || 1;
    const orderedControllers = [...(plan.controllers || plan._rawPlan?.controllers || [])].sort((first, second) => {
        const firstPiece = first.pieces[0];
        const secondPiece = second.pieces[0];
        return (firstPiece.r - secondPiece.r) || (firstPiece.c - secondPiece.c);
    });
    return orderedControllers.map((controller, displayIndex) => {
        const pieces = controller.pieces || [];
        const minRow = Math.min(...pieces.map(piece => piece.r));
        const minCol = Math.min(...pieces.map(piece => piece.c));
        const placedPieces = pieces.map(piece => ({
            piece,
            canvasRow: Number.isFinite(piece.canvasR) ? piece.canvasR : piece.r - minRow,
            canvasCol: Number.isFinite(piece.canvasC) ? piece.canvasC : piece.c - minCol
        }));
        const localRows = Math.max(1, ...placedPieces.map(item => item.canvasRow + item.piece.rows));
        const localCols = Math.max(1, ...placedPieces.map(item => item.canvasCol + item.piece.cols));
        const canvasCols = Math.max(localCols, plan.maxCols || plan._rawPlan?.maxCols || localCols);
        const occupied = new Map();
        placedPieces.forEach(({ piece, canvasRow, canvasCol }) => {
            for (let sourceRow = piece.r; sourceRow < piece.r + piece.rows; sourceRow++) {
                for (let sourceCol = piece.c; sourceCol < piece.c + piece.cols; sourceCol++) {
                    const localRow = canvasRow + sourceRow - piece.r;
                    const localCol = canvasCol + sourceCol - piece.c;
                    const cell = matrix[sourceRow]?.[sourceCol];
                    if (cell) occupied.set(`${localRow},${localCol}`, { cell, sourceRow, sourceCol, localRow, localCol });
                }
            }
        });
        const canvasRowProfile = getProcessorCanvasRows(
            canvas,
            occupied,
            localRows,
            plan.maxRows || plan._rawPlan?.maxRows || localRows,
            unitWidth
        );
        const canvasRows = canvasRowProfile.canvasRows;
        const rowRatios = canvasRowProfile.rowRatios;
        const ports = [...new Set([...occupied.values()].map(item => parseInt(item.cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10)))].sort((first, second) => first - second);
        const portIndex = new Map(ports.map((port, index) => [port, index]));
        const canvasMeta = getProcessorCanvasMeta(pieces, occupied, rowRatios, unitWidth);
        const portLoads = new Map();
        [...occupied.values()].forEach(item => {
            const portNum = parseInt(item.cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10);
            const pixels = (item.cell.pixelW || currentProductObj.pixelW || 0) * (item.cell.pixelH || currentProductObj.pixelH || 0);
            portLoads.set(portNum, (portLoads.get(portNum) || 0) + pixels);
        });
        const portLoadValues = [...portLoads.values()];
        return {
            controller,
            displayIndex,
            toneIndex: displayIndex + 1,
            title: `Processor ${displayIndex + 1}`,
            meta: canvasMeta.meta,
            actualPixelW: canvasMeta.actualPixelW || 0,
            actualPixelH: canvasMeta.actualPixelH || 0,
            portCount: ports.length,
            avgPortPixels: portLoadValues.length ? portLoadValues.reduce((sum, value) => sum + value, 0) / portLoadValues.length : 0,
            maxPortPixels: portLoadValues.length ? Math.max(...portLoadValues) : 0,
            canvasCols,
            canvasRows,
            localCols,
            localRows,
            rowRatios,
            occupied,
            portIndex
        };
    }).filter(page => page.occupied.size > 0);
}

function pdfDrawProcessorCanvasPage(pdf, pageData, PW, PH) {
    const margin = 26;
    const headerBottom = 25;
    const footerTop = PH - 31;
    pdf.setFillColor(255, 255, 255);
    pdf.rect(0, 0, PW, PH, 'F');
    if (_pdfLetterheadImage) pdf.addImage(_pdfLetterheadImage, 'PNG', 0, 0, PW, PH);
    pdfDrawSectionTitle(pdf, pageData.title, margin, headerBottom + 6);
    const top = headerBottom + 11 + pdfDrawInfoStrip(pdf, getProcessorInfoItems(pageData), margin, headerBottom + 11, PW - margin * 2, 4) + 4;
    const gap = 0.28;
    const availableW = PW - margin * 2;
    const availableH = footerTop - top;
    const totalRatio = pageData.rowRatios.reduce((sum, value) => sum + value, 0);
    const base = Math.min(
        (availableW - gap * (pageData.canvasCols - 1)) / pageData.canvasCols,
        (availableH - gap * (pageData.canvasRows - 1)) / totalRatio
    );
    const rowHeights = pageData.rowRatios.map(ratio => ratio * base);
    const gridW = pageData.canvasCols * base + gap * (pageData.canvasCols - 1);
    const gridH = rowHeights.reduce((sum, height) => sum + height, 0) + gap * (pageData.canvasRows - 1);
    const startX = margin + (availableW - gridW) / 2;
    const startY = top + (availableH - gridH) / 2;
    const rowOffsets = [0];
    for (let i = 0; i < rowHeights.length; i++) rowOffsets.push(rowOffsets[i] + rowHeights[i] + gap);

    const boxFor = (localRow, localCol) => ({
        left: startX + localCol * (base + gap),
        top: startY + rowOffsets[localRow],
        width: base,
        height: rowHeights[localRow],
        right: startX + localCol * (base + gap) + base,
        bottom: startY + rowOffsets[localRow] + rowHeights[localRow]
    });

    pdf.setDrawColor(17, 24, 39);
    pdf.setLineWidth(0.35);
    pdf.rect(startX - 0.5, startY - 0.5, gridW + 1, gridH + 1, 'S');

    const labels = [];
    const groups = {};
    for (let localRow = 0; localRow < pageData.canvasRows; localRow++) {
        for (let localCol = 0; localCol < pageData.canvasCols; localCol++) {
            const box = boxFor(localRow, localCol);
            const item = pageData.occupied.get(`${localRow},${localCol}`);
            if (item) {
                const cell = item.cell;
                const portNum = parseInt(cell.portLabel.match(/D(\d+)/)?.[1] || '1', 10);
                const portOrder = pageData.portIndex.get(portNum) ?? 0;
                const fill = portFillColor(pageData.toneIndex, portOrder, localRow, localCol, document.getElementById('routeDirectionSelect')?.value, 'processor');
                const fillRgb = pdfColorToRgb(fill);
                pdf.setDrawColor(fillRgb ? 255 : 203, fillRgb ? 255 : 213, fillRgb ? 255 : 225);
                pdf.setLineWidth(0.08);
                if (fillRgb) {
                    pdf.setFillColor(fillRgb[0], fillRgb[1], fillRgb[2]);
                    pdf.rect(box.left, box.top, box.width, box.height, 'FD');
                } else {
                    pdf.rect(box.left, box.top, box.width, box.height, 'S');
                }
                labels.push({ label: cell.portLabel, x: box.left + box.width / 2, y: box.top + box.height / 2, box });
                const match = cell.portLabel.match(/D(\d+)-(\d+)/);
                if (match) {
                    const groupId = match[1];
                    if (!groups[groupId]) groups[groupId] = [];
                    groups[groupId].push({
                        seq: parseInt(match[2], 10),
                        x: box.left + box.width / 2,
                        y: box.top + box.height / 2,
                        r: localRow,
                        c: localCol,
                        box
                    });
                }
            } else {
                pdf.setFillColor(248, 250, 252);
                pdf.setDrawColor(216, 224, 235);
                pdf.setLineWidth(0.08);
                pdf.rect(box.left, box.top, box.width, box.height, 'FD');
            }
        }
    }

    Object.values(groups).forEach(points => {
        points.sort((a, b) => a.seq - b.seq);
        for (let i = 1; i < points.length; i++) {
            const pts = pdfPathPoints(points[i - 1], points[i], 0, document.getElementById('routeDirectionSelect')?.value || 'vertical');
            const direction = document.getElementById('routeDirectionSelect')?.value || 'vertical';
            const isJumper = direction === 'horizontal' ? points[i - 1].r !== points[i].r : points[i - 1].c !== points[i].c;
            pdfDrawPolyline(pdf, pts, '#1e9bff', isJumper ? 0.5 : 0.36);
        }
    });

    labels.forEach(item => {
        const fontSize = pdfAdaptiveLabelFont(pdf, lastMatrix, item.label, item.box, 4.8, 0.3);
        pdfDrawBadgeText(pdf, item.label, item.x, item.y, fontSize, '#1e9bff', '#ffffff', 'normal');
    });
}

        const hasExplicitDimensions = Number.isFinite(parseInt(cols, 10)) && Number.isFinite(parseInt(rows, 10));
        
        if (model) currentProductObj.model = model;
        if (pixelW !== undefined) currentProductObj.pixelW = pixelW;
        if (pixelH !== undefined) currentProductObj.pixelH = pixelH;
        if (power !== undefined) currentProductObj.power = power;
        if (fullCount !== undefined) _fullCount = fullCount;
        if (system) _currentSystem = system;
        if (bandwidth) _currentBandwidth = bandwidth;
        if (productCategory !== undefined) {
            const incomingCategory = (productCategory || '').toString().trim();
            const categoryChanged = incomingCategory !== _currentProductCategory;
            _currentProductCategory = incomingCategory;
            if (categoryChanged) _routeManualOverride = false;
            applyRouteDefaults(_currentProductCategory, categoryChanged);
        }
        
        // 控制 Half Panel 复 ?  ?
        const halfCheckbox = document.getElementById('addHalfRowCheckbox');
        if (hasHalfSupport !== undefined) {
            halfCheckbox.disabled = !hasHalfSupport;
            if (!hasHalfSupport) halfCheckbox.checked = false;
        }
        
        updateBitRateOptions();
        updateMasterCanvasOptions();
        if (bitRate) {
            const bitRateSelect = document.getElementById('bitRateSelect');
            if ([...bitRateSelect.options].some(option => option.value === bitRate)) bitRateSelect.value = bitRate;
        }
        if (voltageSpec) {
            const voltageSelect = document.getElementById('voltageSelect');
            if ([...voltageSelect.options].some(option => option.value === voltageSpec)) voltageSelect.value = voltageSpec;
        }
        if (routeDirection) {
            const routeSelect = document.getElementById('routeDirectionSelect');
            if ([...routeSelect.options].some(option => option.value === routeDirection)) {
                routeSelect.value = routeDirection;
                _routeManualOverride = true;
            }
        }
        if (masterCanvas) {
            const canvasSelect = document.getElementById('masterCanvasSelect');
            if ([...canvasSelect.options].some(option => option.value === masterCanvas)) {
                canvasSelect.value = masterCanvas;
                _masterCanvasManualOverride = true;
            }
        }
        if (hasExplicitDimensions) {
            document.getElementById('customCols').value = Math.max(1, parseInt(cols, 10));
            document.getElementById('customRows').value = Math.max(1, parseInt(rows, 10));
            halfCheckbox.checked = !!halfRow && !halfCheckbox.disabled;
            computeSystem();
        } else {
            syncRecommendedDimensions();  // 这 ?会按16:9 ?   ?  大屏宽高
        }
    }
});

    document.getElementById('cabVisual').innerHTML = '<div style="padding:30px;">&#9203; &#31561;&#24453;&#22791;&#21697;&#31995;&#32479;&#25512;&#36865;&#25968;&#25454; (postMessage SYNC_MAPPING)...</div>';
     document.getElementById('addHalfRowCheckbox').disabled = true;
}

init();
</script>
</body>
</html>
